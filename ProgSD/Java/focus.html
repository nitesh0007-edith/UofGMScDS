<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-void: #000000;
            --bg-surface: #0a0a0a;
            --bg-elevated: #111111;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-tertiary: rgba(255, 255, 255, 0.25);
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.15);
            --border: rgba(255, 255, 255, 0.08);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--bg-void);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Subtle animated gradient background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255, 107, 53, 0.03), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(255, 255, 255, 0.02), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            padding: 2rem;
            animation: fadeIn 1.5s var(--transition-smooth);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Time display */
        .time-wrapper {
            text-align: center;
            position: relative;
        }

        .time {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(5rem, 18vw, 14rem);
            font-weight: 400;
            letter-spacing: -0.03em;
            line-height: 1;
            background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .time::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 1.5rem;
        }

        /* Current focus section */
        .focus-section {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 1.5s var(--transition-smooth) 0.3s both;
        }

        .focus-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .focus-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .current-focus {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-style: italic;
            color: var(--text-primary);
            min-height: 3rem;
            transition: all 0.3s var(--transition-smooth);
        }

        .current-focus.empty {
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Task list */
        .task-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, transparent 0%, var(--bg-surface) 30%);
            padding: 2rem;
            padding-bottom: max(2rem, env(safe-area-inset-bottom));
            transform: translateY(calc(100% - 80px));
            transition: transform 0.5s var(--transition-smooth);
            z-index: 10;
        }

        .task-panel.expanded {
            transform: translateY(0);
        }

        .task-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding-bottom: 1.5rem;
        }

        .task-panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .task-count {
            background: var(--bg-elevated);
            padding: 0.25rem 0.6rem;
            border-radius: 100px;
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        .expand-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s var(--transition-smooth);
        }

        .task-panel.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .expand-icon svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-secondary);
        }

        .task-input-wrapper {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s var(--transition-smooth) 0.1s;
        }

        .task-panel.expanded .task-input-wrapper {
            opacity: 1;
            transform: translateY(0);
        }

        .task-input {
            flex: 1;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s var(--transition-smooth);
        }

        .task-input::placeholder {
            color: var(--text-tertiary);
        }

        .task-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .add-btn {
            background: var(--text-primary);
            color: var(--bg-void);
            border: none;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
        }

        .add-btn:hover {
            background: var(--accent);
            transform: scale(1.02);
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .task-list {
            list-style: none;
            max-height: 40vh;
            overflow-y: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s var(--transition-smooth) 0.2s;
        }

        .task-panel.expanded .task-list {
            opacity: 1;
            transform: translateY(0);
        }

        .task-list::-webkit-scrollbar {
            width: 4px;
        }

        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            animation: slideIn 0.3s var(--transition-smooth);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-tertiary);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .task-checkbox:hover {
            border-color: var(--accent);
        }

        .task-checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .task-checkbox.checked svg {
            opacity: 1;
        }

        .task-checkbox svg {
            width: 12px;
            height: 12px;
            stroke: var(--bg-void);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-text {
            flex: 1;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
        }

        .task-text.completed {
            text-decoration: line-through;
            color: var(--text-tertiary);
        }

        .task-text.active {
            color: var(--accent);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-item:hover .task-actions {
            opacity: 1;
        }

        .task-action-btn {
            background: none;
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.2s;
        }

        .task-action-btn:hover {
            opacity: 1;
        }

        .task-action-btn svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-secondary);
        }

        .task-action-btn.delete:hover svg {
            stroke: #ff4444;
        }

        .task-action-btn.focus:hover svg {
            stroke: var(--accent);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Keyboard hint */
        .keyboard-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--text-tertiary);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .keyboard-hint.visible {
            opacity: 1;
        }

        .keyboard-hint kbd {
            background: var(--bg-elevated);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin: 0 0.25rem;
        }

        /* Ambient Sound Controls */
        .ambient-controls {
            position: fixed;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 0.75rem;
            z-index: 20;
            animation: fadeIn 1.5s var(--transition-smooth) 0.5s both;
        }

        .sound-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .sound-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, var(--accent-glow), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .sound-btn:hover {
            border-color: var(--text-tertiary);
            transform: scale(1.05);
        }

        .sound-btn.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .sound-btn.active::before {
            opacity: 1;
        }

        .sound-btn svg {
            width: 22px;
            height: 22px;
            stroke: var(--text-secondary);
            transition: all 0.3s var(--transition-smooth);
            position: relative;
            z-index: 1;
        }

        .sound-btn.active svg {
            stroke: var(--accent);
        }

        .sound-btn .volume-ring {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            opacity: 0;
            animation: none;
        }

        .sound-btn.active .volume-ring {
            opacity: 1;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .sound-label {
            position: absolute;
            bottom: -1.75rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .sound-btn:hover .sound-label {
            opacity: 1;
        }

        /* Volume slider */
        .volume-popup {
            position: absolute;
            top: calc(100% + 0.75rem);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s var(--transition-smooth);
            z-index: 30;
        }

        .sound-btn:hover .volume-popup,
        .volume-popup:hover {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) scale(1);
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--text-primary);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            background: var(--accent);
            transform: scale(1.2);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .ambient-controls {
                top: 1rem;
                right: 1rem;
                gap: 0.5rem;
            }

            .sound-btn {
                width: 44px;
                height: 44px;
            }

            .sound-btn svg {
                width: 18px;
                height: 18px;
            }

            .volume-popup {
                right: 0;
                left: auto;
                transform: scale(0.9);
            }

            .sound-btn:hover .volume-popup,
            .volume-popup:hover {
                transform: scale(1);
            }
            .task-panel {
                padding: 1.5rem;
            }

            .task-input-wrapper {
                flex-direction: column;
            }

            .add-btn {
                width: 100%;
            }

            .task-actions {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- Ambient Sound Controls -->
    <div class="ambient-controls">
        <button class="sound-btn" id="birdsBtn" onclick="toggleSound('birds')">
            <div class="volume-ring"></div>
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 7h.01"></path>
                <path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"></path>
                <path d="m20 7 2 .5-2 .5"></path>
                <path d="M10 18v3"></path>
                <path d="M14 17.75V21"></path>
                <path d="M7 18a6 6 0 0 0 3.84-10.61"></path>
            </svg>
            <span class="sound-label">Birds</span>
            <div class="volume-popup">
                <input type="range" class="volume-slider" id="birdsVolume" min="0" max="100" value="50" oninput="setVolume('birds', this.value)">
            </div>
        </button>
        
        <button class="sound-btn" id="rainBtn" onclick="toggleSound('rain')">
            <div class="volume-ring"></div>
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path>
                <path d="M16 14v6"></path>
                <path d="M8 14v6"></path>
                <path d="M12 16v6"></path>
            </svg>
            <span class="sound-label">Rain</span>
            <div class="volume-popup">
                <input type="range" class="volume-slider" id="rainVolume" min="0" max="100" value="50" oninput="setVolume('rain', this.value)">
            </div>
        </button>
    </div>
    
    <div class="container">
        <div class="time-wrapper">
            <div class="time" id="time">00:00</div>
            <div class="date" id="date">Loading...</div>
        </div>

        <div class="focus-section">
            <div class="focus-label">Currently Focusing On</div>
            <div class="current-focus empty" id="currentFocus">Click a task to set your focus</div>
        </div>
    </div>

    <div class="keyboard-hint" id="keyboardHint">
        Press <kbd>Space</kbd> to toggle panel · <kbd>N</kbd> to add task
    </div>

    <div class="task-panel" id="taskPanel">
        <div class="task-panel-header" onclick="togglePanel()">
            <div class="task-panel-title">
                Focus List
                <span class="task-count" id="taskCount">0</span>
            </div>
            <div class="expand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
            </div>
        </div>

        <div class="task-input-wrapper">
            <input type="text" class="task-input" id="taskInput" placeholder="What needs your attention?" maxlength="100">
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>

        <ul class="task-list" id="taskList">
            <li class="empty-state">Your focus list is empty. Add something to work on.</li>
        </ul>
    </div>

    <script>
        // Ambient Sounds
        const sounds = {
            birds: {
                audio: null,
                url: 'https://cdn.freesound.org/previews/531/531015_10623498-lq.mp3',
                playing: false,
                volume: 0.5
            },
            rain: {
                audio: null,
                url: 'https://cdn.freesound.org/previews/531/531947_11110271-lq.mp3',
                playing: false,
                volume: 0.5
            }
        };

        function initSound(type) {
            if (!sounds[type].audio) {
                sounds[type].audio = new Audio(sounds[type].url);
                sounds[type].audio.loop = true;
                sounds[type].audio.volume = sounds[type].volume;
                
                // Handle loading errors gracefully
                sounds[type].audio.onerror = () => {
                    console.log(`Could not load ${type} sound, trying backup...`);
                    // Backup URLs
                    const backups = {
                        birds: 'https://assets.mixkit.co/active_storage/sfx/2432/2432-preview.mp3',
                        rain: 'https://assets.mixkit.co/active_storage/sfx/2515/2515-preview.mp3'
                    };
                    sounds[type].audio.src = backups[type];
                };
            }
            return sounds[type].audio;
        }

        function toggleSound(type) {
            const audio = initSound(type);
            const btn = document.getElementById(`${type}Btn`);
            
            if (sounds[type].playing) {
                audio.pause();
                btn.classList.remove('active');
                sounds[type].playing = false;
            } else {
                // Try to play, handle autoplay restrictions
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        btn.classList.add('active');
                        sounds[type].playing = true;
                    }).catch(error => {
                        console.log('Autoplay prevented, click again to play');
                        btn.classList.add('active');
                        sounds[type].playing = true;
                    });
                }
            }
            
            // Save state
            localStorage.setItem(`sound_${type}`, sounds[type].playing);
        }

        function setVolume(type, value) {
            sounds[type].volume = value / 100;
            if (sounds[type].audio) {
                sounds[type].audio.volume = sounds[type].volume;
            }
            localStorage.setItem(`volume_${type}`, value);
        }

        // Restore sound settings
        function restoreSoundSettings() {
            ['birds', 'rain'].forEach(type => {
                const savedVolume = localStorage.getItem(`volume_${type}`);
                if (savedVolume) {
                    sounds[type].volume = savedVolume / 100;
                    document.getElementById(`${type}Volume`).value = savedVolume;
                }
            });
        }

        restoreSoundSettings();

        // State
        let tasks = JSON.parse(localStorage.getItem('focusTasks') || '[]');
        let currentFocusId = localStorage.getItem('currentFocusId') || null;
        let panelExpanded = false;

        // Elements
        const timeEl = document.getElementById('time');
        const dateEl = document.getElementById('date');
        const currentFocusEl = document.getElementById('currentFocus');
        const taskPanel = document.getElementById('taskPanel');
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');
        const taskCount = document.getElementById('taskCount');
        const keyboardHint = document.getElementById('keyboardHint');

        // Time update
        function updateTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            timeEl.textContent = `${hours}:${minutes}`;

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            dateEl.textContent = now.toLocaleDateString('en-US', options);
        }

        // Panel toggle
        function togglePanel() {
            panelExpanded = !panelExpanded;
            taskPanel.classList.toggle('expanded', panelExpanded);
            if (panelExpanded) {
                setTimeout(() => taskInput.focus(), 300);
            }
        }

        // Task management
        function saveTasks() {
            localStorage.setItem('focusTasks', JSON.stringify(tasks));
            localStorage.setItem('currentFocusId', currentFocusId || '');
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) return;

            const task = {
                id: Date.now().toString(),
                text: text,
                completed: false,
                createdAt: new Date().toISOString()
            };

            tasks.unshift(task);
            taskInput.value = '';
            saveTasks();
            renderTasks();
            
            // If no current focus, set this as focus
            if (!currentFocusId) {
                setFocus(task.id);
            }
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                if (task.completed && currentFocusId === id) {
                    // Find next incomplete task
                    const nextTask = tasks.find(t => !t.completed && t.id !== id);
                    setFocus(nextTask ? nextTask.id : null);
                }
                saveTasks();
                renderTasks();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            if (currentFocusId === id) {
                const nextTask = tasks.find(t => !t.completed);
                setFocus(nextTask ? nextTask.id : null);
            }
            saveTasks();
            renderTasks();
        }

        function setFocus(id) {
            currentFocusId = id;
            const task = tasks.find(t => t.id === id);
            
            if (task) {
                currentFocusEl.textContent = task.text;
                currentFocusEl.classList.remove('empty');
            } else {
                currentFocusEl.textContent = 'Click a task to set your focus';
                currentFocusEl.classList.add('empty');
            }
            
            saveTasks();
            renderTasks();
        }

        function renderTasks() {
            const incompleteTasks = tasks.filter(t => !t.completed);
            const completedTasks = tasks.filter(t => t.completed);
            const allTasks = [...incompleteTasks, ...completedTasks];
            
            taskCount.textContent = incompleteTasks.length;

            if (allTasks.length === 0) {
                taskList.innerHTML = '<li class="empty-state">Your focus list is empty. Add something to work on.</li>';
                return;
            }

            taskList.innerHTML = allTasks.map(task => `
                <li class="task-item" data-id="${task.id}">
                    <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask('${task.id}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <span class="task-text ${task.completed ? 'completed' : ''} ${currentFocusId === task.id ? 'active' : ''}" 
                          onclick="setFocus('${task.id}')">${escapeHtml(task.text)}</span>
                    <div class="task-actions">
                        <button class="task-action-btn focus" onclick="setFocus('${task.id}')" title="Set as focus">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                        <button class="task-action-btn delete" onclick="deleteTask('${task.id}')" title="Delete">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </li>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts when typing in input
            if (e.target === taskInput) {
                if (e.key === 'Enter') {
                    addTask();
                }
                return;
            }

            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                togglePanel();
            } else if (e.key === 'n' || e.key === 'N') {
                if (!panelExpanded) togglePanel();
                setTimeout(() => taskInput.focus(), 300);
            } else if (e.key === 'Escape' && panelExpanded) {
                togglePanel();
            }
        });

        // Show keyboard hint after a delay
        setTimeout(() => {
            keyboardHint.classList.add('visible');
            setTimeout(() => {
                keyboardHint.classList.remove('visible');
            }, 5000);
        }, 2000);

        // Initialize
        updateTime();
        setInterval(updateTime, 1000);
        
        // Restore current focus
        if (currentFocusId) {
            const task = tasks.find(t => t.id === currentFocusId);
            if (task) {
                currentFocusEl.textContent = task.text;
                currentFocusEl.classList.remove('empty');
            } else {
                currentFocusId = null;
            }
        }
        
        renderTasks();

        // Service worker for PWA (optional enhancement)
        if ('serviceWorker' in navigator) {
            // Could add offline support here
        }
    </script>
</body>
</html>
