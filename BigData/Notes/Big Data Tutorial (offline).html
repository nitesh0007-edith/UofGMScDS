\">\"where is file X?\"<\u002Ftext>\n        <line x1=\"320\" y1=\"64\" x2=\"180\" y2=\"64\" stroke=\"#7A6F65\" marker-end=\"url(#arr4)\"><\u002Fline>\n        <text x=\"240\" y=\"80\" font-size=\"11\" fill=\"#7A6F65\">\"on DN2 and DN3\"<\u002Ftext>\n\n        <line x1=\"140\" y1=\"160\" x2=\"140\" y2=\"100\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n        <line x1=\"320\" y1=\"160\" x2=\"320\" y2=\"100\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n        <line x1=\"500\" y1=\"160\" x2=\"500\" y2=\"100\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n        <line x1=\"680\" y1=\"160\" x2=\"680\" y2=\"100\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n\n        <!-- direct read line -->\n        <line x1=\"180\" y1=\"56\" x2=\"240\" y2=\"160\" stroke=\"oklch(65% 0.13 60)\" stroke-width=\"2\" marker-end=\"url(#arr4)\"><\u002Fline>\n        <text x=\"190\" y=\"120\" font-size=\"11\" fill=\"oklch(45% 0.13 60)\" font-weight=\"600\">data flows direct<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cap\">HDFS has one NameNode (metadata in RAM) and many DataNodes (the actual bytes on disk). The client only talks to the NameNode to find out where blocks are — actual data flows directly between client and DataNode.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Block size — why 128 MB?<\u002Fh3>\n  <p>HDFS uses very big blocks compared to a normal filesystem (4 KB). The reason is hard-disk physics.<\u002Fp>\n  <div class=\"formula\">block_size = transfer_rate × seek_time × 100<\u002Fdiv>\n  <p>If a seek is ~10 ms and transfer is ~100 MB/s, then to make the seek only 1% of total read time you need ~100 MB blocks.\n  Round to 128 MB. Big blocks mean: (1) fewer entries in the NameNode index, (2) less time spent seeking vs reading,\n  (3) fewer network connections. Downside: small files waste space — each file ≥ 1 block of metadata.<\u002Fp>\n\n  <h3>The HDFS write pipeline<\u002Fh3>\n  <ol class=\"steps\">\n    <li>Client calls <code class=\"inline\">create()<\u002Fcode> on the NameNode for a new file.<\u002Fli>\n    <li>NameNode picks DataNodes for the first block and gives the client (a) a <strong>lease<\u002Fstrong> (1-writer lock), (b) the block ID, (c) the list of DataNodes.<\u002Fli>\n    <li>Client arranges the DataNodes into a <strong>pipeline<\u002Fstrong> based on network proximity (shortest path).<\u002Fli>\n    <li>Client breaks data into <strong>64 KB packets<\u002Fstrong> in a local buffer.<\u002Fli>\n    <li>Packets flow: <code class=\"inline\">Client → DN1 → DN2 → DN3<\u002Fcode>. While DN2 is forwarding the previous packet to DN3, DN1 is already pushing the next one — fully <strong>pipelined<\u002Fstrong>.<\u002Fli>\n    <li>Acknowledgements flow back the other way: <code class=\"inline\">DN3 → DN2 → DN1 → Client<\u002Fcode>.<\u002Fli>\n    <li><code class=\"inline\">hflush()<\u002Fcode> forces all packets sent so far to be visible to other readers.<\u002Fli>\n  <\u002Fol>\n\n  <h3>The HDFS read pipeline<\u002Fh3>\n  <ol class=\"steps\">\n    <li>Client gives the NameNode the file path.<\u002Fli>\n    <li>NameNode returns the block IDs + DataNode locations, <strong>sorted by network distance<\u002Fstrong>.<\u002Fli>\n    <li>Client contacts the nearest DataNode directly for each block.<\u002Fli>\n    <li>DataNode streams data in 64 KB packets <strong>plus a checksum<\u002Fstrong>.<\u002Fli>\n    <li>Client verifies the checksum. If it fails, it reports the bad replica to the NameNode and tries the next-nearest DataNode.<\u002Fli>\n    <li>If a DataNode is unreachable, the same recovery: mark faulty, try the next replica.<\u002Fli>\n    <li>Client caches DataNode locations so it does not pester the NameNode again.<\u002Fli>\n  <\u002Fol>\n\n  <div class=\"callout exam\">\n    <div class=\"icn\">★<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Exam scoring trick (from 2018 marking scheme)<\u002Fdiv>\n      <p>About <strong>40 %<\u002Fstrong> of the marks on the \"read pipeline\" question are for the <strong>failure and recovery<\u002Fstrong> part.\n      You must mention checksum verification, fallback to the next DataNode, and reporting bad replicas to the NameNode.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Replica placement — the rack-aware rule<\u002Fh3>\n  <p>Default replication factor is 3. By default:<\u002Fp>\n  <ul>\n    <li><strong>Replica 1<\u002Fstrong> — same node as the writer (or a random node if the writer is outside the cluster).<\u002Fli>\n    <li><strong>Replica 2<\u002Fstrong> — a different rack from Replica 1.<\u002Fli>\n    <li><strong>Replica 3<\u002Fstrong> — same rack as Replica 2, but a different node.<\u002Fli>\n  <\u002Ful>\n  <p>Why? Replica 1 is fast (local write). Replica 2 protects against a whole rack going down. Replica 3 shares a rack with R2,\n  which means only <strong>one<\u002Fstrong> cross-rack network transfer is needed during the write.<\u002Fp>\n\n  <h3>NameNode recovery<\u002Fh3>\n  <p>The NameNode keeps two things on its local disk:<\u002Fp>\n  <ul>\n    <li><strong>Checkpoint file (fsimage)<\u002Fstrong> — a snapshot of the whole filesystem state.<\u002Fli>\n    <li><strong>Journal (edit log)<\u002Fstrong> — every change since the last checkpoint, append-only.<\u002Fli>\n  <\u002Ful>\n  <p>On restart, NameNode reads the checkpoint, replays the journal, then waits for DataNodes to <strong>register<\u002Fstrong> and send\n  <strong>block reports<\u002Fstrong> (the list of blocks they hold). It stays in <em>safe mode<\u002Fem> until enough replicas are confirmed.<\u002Fp>\n\n  <h3>Block states &amp; pipeline recovery<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th>State<\u002Fth><th>Meaning<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>RBW<\u002Fstrong> — Replica Being Written<\u002Ftd><td>Block is currently being written.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>RWR<\u002Fstrong> — Replica Waiting to be Recovered<\u002Ftd><td>Writer crashed, block needs recovery.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>RUR<\u002Fstrong> — Replica Under Recovery<\u002Ftd><td>Recovery is in progress.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Finalized<\u002Fstrong><\u002Ftd><td>Block is sealed and complete.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <p>If a DataNode in the middle of a write pipeline dies, the client removes it, continues with the rest, and the NameNode\n  schedules <strong>re-replication<\u002Fstrong> later to bring the count back up to 3.<\u002Fp>\n\n  <h3>NFS vs HDFS — high-frequency exam question<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th><\u002Fth><th>NFS<\u002Fth><th>HDFS<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td>Architecture<\u002Ftd><td>Centralised server<\u002Ftd><td>Distributed: NameNode + many DataNodes<\u002Ftd><\u002Ftr>\n      <tr><td>Single point of failure?<\u002Ftd><td>Yes — server<\u002Ftd><td>Mitigated (replication + standby NN)<\u002Ftd><\u002Ftr>\n      <tr><td>Scalability<\u002Ftd><td>Limited by one server's I/O<\u002Ftd><td>Horizontally scalable to thousands of nodes<\u002Ftd><\u002Ftr>\n      <tr><td>Optimised for<\u002Ftd><td>Random read/write of any file size<\u002Ftd><td>Large files, streaming reads<\u002Ftd><\u002Ftr>\n      <tr><td>Replication<\u002Ftd><td>None built in (uses RAID at the server)<\u002Ftd><td>Built-in, rack-aware, default 3×<\u002Ftd><\u002Ftr>\n      <tr><td>CAP class<\u002Ftd><td>CA<\u002Ftd><td>CP<\u002Ftd><\u002Ftr>\n      <tr><td>Small files<\u002Ftd><td>Fine<\u002Ftd><td>Bad — wastes NameNode metadata<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>RAID quick reference<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th>Level<\u002Fth><th>Method<\u002Fth><th>Space<\u002Fth><th>Fault tolerance<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td>RAID 0<\u002Ftd><td>Striping only<\u002Ftd><td>100%<\u002Ftd><td>None<\u002Ftd><\u002Ftr>\n      <tr><td>RAID 1<\u002Ftd><td>Mirroring<\u002Ftd><td>50%<\u002Ftd><td>1 disk<\u002Ftd><\u002Ftr>\n      <tr><td>RAID 5<\u002Ftd><td>Striping + parity<\u002Ftd><td>(n-1)/n<\u002Ftd><td>1 disk<\u002Ftd><\u002Ftr>\n      <tr><td>RAID 6<\u002Ftd><td>Striping + double parity<\u002Ftd><td>(n-2)/n<\u002Ftd><td>2 disks<\u002Ftd><\u002Ftr>\n      <tr><td>RAID 10<\u002Ftd><td>Striped mirrors<\u002Ftd><td>50%<\u002Ftd><td>1 per mirror pair<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 06 · CAP ========== -->\n<section class=\"chapter\" id=\"cap\">\n  <span class=\"eyebrow\">Chapter 06<\u002Fspan>\n  <h2 class=\"chapter-title\">CAP theorem &amp; BASE<\u002Fh2>\n  <p class=\"lede\">In a distributed system you can pick only <strong>two<\u002Fstrong> of Consistency, Availability, and Partition tolerance.\n  Click any vertex of the triangle to see what each pair gets you.<\u002Fp>\n\n  <div class=\"interactive\" id=\"cap-widget\">\n    <div class=\"head\"><div class=\"ttl\">The CAP triangle<\u002Fdiv><div class=\"tag\">interactive<\u002Fdiv><\u002Fdiv>\n    <div class=\"cap-wrap\">\n      <svg viewBox=\"0 0 320 300\" role=\"img\" aria-label=\"CAP triangle\">\n        <defs>\n          <linearGradient id=\"capg1\" x1=\"0\" x2=\"1\"><stop offset=\"0\" stop-color=\"oklch(95% 0.04 250)\"><\u002Fstop><stop offset=\"1\" stop-color=\"oklch(85% 0.06 250)\"><\u002Fstop><\u002FlinearGradient>\n        <\u002Fdefs>\n        <polygon points=\"160,30 290,260 30,260\" fill=\"url(#capg1)\" stroke=\"#D6CCBC\" stroke-width=\"1.5\"><\u002Fpolygon>\n        <!-- Pair labels (sides) -->\n        <g class=\"cap-vertex\" data-cap=\"CA\"><rect x=\"60\" y=\"30\" width=\"60\" height=\"28\" rx=\"6\" fill=\"#1E1A16\"><\u002Frect><text x=\"90\" y=\"48\" text-anchor=\"middle\" fill=\"white\" font-family=\"IBM Plex Sans\" font-weight=\"600\" font-size=\"13\">CA<\u002Ftext><\u002Fg>\n        <g class=\"cap-vertex\" data-cap=\"CP\"><rect x=\"200\" y=\"30\" width=\"60\" height=\"28\" rx=\"6\" fill=\"#1E1A16\"><\u002Frect><text x=\"230\" y=\"48\" text-anchor=\"middle\" fill=\"white\" font-family=\"IBM Plex Sans\" font-weight=\"600\" font-size=\"13\">CP<\u002Ftext><\u002Fg>\n        <g class=\"cap-vertex\" data-cap=\"AP\"><rect x=\"130\" y=\"260\" width=\"60\" height=\"28\" rx=\"6\" fill=\"#1E1A16\"><\u002Frect><text x=\"160\" y=\"278\" text-anchor=\"middle\" fill=\"white\" font-family=\"IBM Plex Sans\" font-weight=\"600\" font-size=\"13\">AP<\u002Ftext><\u002Fg>\n\n        <!-- Vertices -->\n        <g font-family=\"IBM Plex Sans\" font-size=\"16\" font-weight=\"600\">\n          <circle cx=\"160\" cy=\"30\" r=\"22\" fill=\"oklch(50% 0.13 250)\"><\u002Fcircle>\n          <text x=\"160\" y=\"35\" text-anchor=\"middle\" fill=\"white\">C<\u002Ftext>\n          <text x=\"160\" y=\"20\" text-anchor=\"middle\" fill=\"#1E1A16\" font-size=\"11\">Consistency<\u002Ftext>\n\n          <circle cx=\"290\" cy=\"260\" r=\"22\" fill=\"oklch(65% 0.13 60)\"><\u002Fcircle>\n          <text x=\"290\" y=\"265\" text-anchor=\"middle\" fill=\"white\">A<\u002Ftext>\n          <text x=\"290\" y=\"290\" text-anchor=\"middle\" fill=\"#1E1A16\" font-size=\"11\">Availability<\u002Ftext>\n\n          <circle cx=\"30\" cy=\"260\" r=\"22\" fill=\"oklch(55% 0.13 150)\"><\u002Fcircle>\n          <text x=\"30\" y=\"265\" text-anchor=\"middle\" fill=\"white\">P<\u002Ftext>\n          <text x=\"30\" y=\"290\" text-anchor=\"middle\" fill=\"#1E1A16\" font-size=\"11\">Partition tol.<\u002Ftext>\n        <\u002Fg>\n      <\u002Fsvg>\n      <div class=\"cap-info\">Loading…<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>The three properties in plain words<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th>Property<\u002Fth><th>What it really means<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Consistency (C)<\u002Fstrong><\u002Ftd><td>Every read returns the most recent write. All nodes see the same data at the same time.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Availability (A)<\u002Fstrong><\u002Ftd><td>Every request gets a response. The system is always up.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Partition tolerance (P)<\u002Fstrong><\u002Ftd><td>The system keeps working even when the network is cut into pieces.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"callout tip\">\n    <div class=\"icn\">i<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Why only two?<\u002Fdiv>\n      <p>If the network gets split, you have a choice: <em>reply with potentially old data<\u002Fem> (keep A, lose C) or <em>refuse to reply\n      until the split heals<\u002Fem> (keep C, lose A). You cannot avoid partitions in real distributed systems — so P is basically\n      mandatory. The real choice is <strong>C vs A during a partition<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>ACID vs BASE<\u002Fh3>\n  <div class=\"versus\">\n    <div class=\"side\">\n      <h4>ACID (classic DB)<\u002Fh4>\n      <ul>\n        <li><strong>A<\u002Fstrong>tomicity — all or nothing<\u002Fli>\n        <li><strong>C<\u002Fstrong>onsistency — valid state transitions<\u002Fli>\n        <li><strong>I<\u002Fstrong>solation — txns don't see each other<\u002Fli>\n        <li><strong>D<\u002Fstrong>urability — committed = permanent<\u002Fli>\n      <\u002Ful>\n      <p style=\"margin-top: 6px\"><em>Use for banking, billing, anywhere correctness wins.<\u002Fem><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vs-mid\">VS<\u002Fdiv>\n    <div class=\"side\">\n      <h4>BASE (NoSQL)<\u002Fh4>\n      <ul>\n        <li><strong>B<\u002Fstrong>asically Available<\u002Fli>\n        <li><strong>S<\u002Fstrong>oft state — may change without input<\u002Fli>\n        <li><strong>E<\u002Fstrong>ventually consistent — converges later<\u002Fli>\n      <\u002Ful>\n      <p style=\"margin-top: 6px\"><em>Use for social, analytics, anywhere \"soon\" is good enough.<\u002Fem><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 07 · LSM + BLOOM ========== -->\n<section class=\"chapter\" id=\"lsm\">\n  <span class=\"eyebrow\">Chapter 07<\u002Fspan>\n  <h2 class=\"chapter-title\">LSM trees &amp; Bloom filters<\u002Fh2>\n  <p class=\"lede\">A write-optimised index structure (LSM), paired with a clever \"is this key probably here?\" filter (Bloom).\n  Together they make HBase and Cassandra fast.<\u002Fp>\n\n  <h3>The problem<\u002Fh3>\n  <p>A classic B-tree index is fast for reads but slow for writes — every insert needs random disk seeks. In Big Data,\n  writes are constant. We need a structure that turns random writes into <strong>sequential writes<\u002Fstrong>.<\u002Fp>\n\n  <h3>LSM tree — the recipe<\u002Fh3>\n\n  <div class=\"diagram\">\n    <svg viewBox=\"0 0 800 280\" role=\"img\" aria-label=\"LSM tree write flow\">\n      <defs><marker id=\"arr5\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#7A6F65\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n      <g font-family=\"IBM Plex Sans\" font-size=\"13\">\n        <!-- WAL -->\n        <rect x=\"40\" y=\"20\" width=\"160\" height=\"50\" rx=\"8\" fill=\"oklch(95% 0.04 25)\" stroke=\"oklch(70% 0.10 25)\"><\u002Frect>\n        <text x=\"120\" y=\"42\" text-anchor=\"middle\" font-weight=\"600\">WAL<\u002Ftext>\n        <text x=\"120\" y=\"58\" text-anchor=\"middle\" font-size=\"11\" fill=\"#7A6F65\">crash safety, on disk<\u002Ftext>\n\n        <!-- MemTable -->\n        <rect x=\"240\" y=\"20\" width=\"160\" height=\"50\" rx=\"8\" fill=\"oklch(95% 0.04 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n        <text x=\"320\" y=\"42\" text-anchor=\"middle\" font-weight=\"600\">MemTable<\u002Ftext>\n        <text x=\"320\" y=\"58\" text-anchor=\"middle\" font-size=\"11\" fill=\"#7A6F65\">sorted, in RAM<\u002Ftext>\n\n        <!-- Flush -->\n        <text x=\"320\" y=\"100\" text-anchor=\"middle\" font-size=\"11\" fill=\"oklch(45% 0.13 60)\">flush when full ↓<\u002Ftext>\n\n        <!-- SSTables -->\n        <g>\n          <rect x=\"240\" y=\"120\" width=\"160\" height=\"40\" rx=\"6\" fill=\"#1E1A16\"><\u002Frect>\n          <text x=\"320\" y=\"146\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">SSTable 1 (newest)<\u002Ftext>\n          <rect x=\"240\" y=\"166\" width=\"160\" height=\"40\" rx=\"6\" fill=\"#1E1A16\"><\u002Frect>\n          <text x=\"320\" y=\"192\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">SSTable 2<\u002Ftext>\n          <rect x=\"240\" y=\"212\" width=\"160\" height=\"40\" rx=\"6\" fill=\"#1E1A16\"><\u002Frect>\n          <text x=\"320\" y=\"238\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">SSTable 3 (oldest)<\u002Ftext>\n        <\u002Fg>\n        <text x=\"320\" y=\"270\" text-anchor=\"middle\" font-size=\"11\" fill=\"#7A6F65\">sorted, immutable, on disk<\u002Ftext>\n\n        <!-- Compaction -->\n        <rect x=\"480\" y=\"160\" width=\"160\" height=\"50\" rx=\"8\" fill=\"oklch(95% 0.04 150)\" stroke=\"oklch(70% 0.10 150)\"><\u002Frect>\n        <text x=\"560\" y=\"182\" text-anchor=\"middle\" font-weight=\"600\">Compactor<\u002Ftext>\n        <text x=\"560\" y=\"198\" text-anchor=\"middle\" font-size=\"11\" fill=\"#7A6F65\">merges old SSTables<\u002Ftext>\n\n        <!-- Bloom -->\n        <rect x=\"660\" y=\"120\" width=\"120\" height=\"40\" rx=\"6\" fill=\"oklch(65% 0.13 60)\"><\u002Frect>\n        <text x=\"720\" y=\"146\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Bloom filter<\u002Ftext>\n        <rect x=\"660\" y=\"170\" width=\"120\" height=\"40\" rx=\"6\" fill=\"oklch(65% 0.13 60)\"><\u002Frect>\n        <text x=\"720\" y=\"196\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Bloom filter<\u002Ftext>\n\n        <!-- arrows -->\n        <line x1=\"200\" y1=\"44\" x2=\"240\" y2=\"44\" stroke=\"#7A6F65\" marker-end=\"url(#arr5)\"><\u002Fline>\n        <line x1=\"320\" y1=\"70\" x2=\"320\" y2=\"120\" stroke=\"#7A6F65\" marker-end=\"url(#arr5)\"><\u002Fline>\n        <line x1=\"400\" y1=\"140\" x2=\"660\" y2=\"140\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n        <line x1=\"400\" y1=\"186\" x2=\"660\" y2=\"186\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n        <line x1=\"400\" y1=\"186\" x2=\"480\" y2=\"186\" stroke=\"#7A6F65\" marker-end=\"url(#arr5)\"><\u002Fline>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cap\">LSM write path: WAL → MemTable → (when full) flush to a new immutable SSTable. Compaction merges old SSTables. Each SSTable has a Bloom filter to skip it quickly on reads.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <table class=\"tbl\">\n    <thead><tr><th>Piece<\u002Fth><th>What it does<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>WAL — Write-Ahead Log<\u002Fstrong><\u002Ftd><td>Every write is appended here first, on disk. If the machine crashes before the MemTable is flushed, the WAL is replayed.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>MemTable<\u002Fstrong><\u002Ftd><td>An in-memory sorted structure (red-black tree, skip list). Cheap to insert into.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>SSTable — Sorted String Table<\u002Fstrong><\u002Ftd><td>An on-disk, sorted, immutable file. Once written, never changed. New writes go into a new MemTable.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Compactor<\u002Fstrong><\u002Ftd><td>A background worker that merges several SSTables into one. Removes duplicates (keeps the newest) and finally removes tombstones.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Bloom filter<\u002Fstrong><\u002Ftd><td>For each SSTable, a small probabilistic index that says \"this key is probably here\" or \"definitely not here\".<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>The write path (4 steps)<\u002Fh3>\n  <ol class=\"steps\">\n    <li><strong>Append to WAL<\u002Fstrong> for durability.<\u002Fli>\n    <li><strong>Insert into MemTable<\u002Fstrong> (sorted, RAM, very fast).<\u002Fli>\n    <li>When MemTable hits its threshold, <strong>flush it to disk as a brand-new SSTable<\u002Fstrong>.<\u002Fli>\n    <li>In the background, <strong>compact<\u002Fstrong> the SSTables periodically.<\u002Fli>\n  <\u002Fol>\n\n  <h3>The read path<\u002Fh3>\n  <ol class=\"steps\">\n    <li>Check the MemTable (most recent writes).<\u002Fli>\n    <li>Check each SSTable from newest to oldest — but ask its Bloom filter first to skip SSTables that definitely don't have the key.<\u002Fli>\n    <li>If not found anywhere, the key does not exist.<\u002Fli>\n  <\u002Fol>\n\n  <h3>Tombstones<\u002Fh3>\n  <p>SSTables are immutable, so you can't actually delete a row from them. Instead a <strong>tombstone<\u002Fstrong> (a special \"deleted\" marker)\n  is written. During compaction, when no older SSTable references that key, the tombstone is finally removed.<\u002Fp>\n\n  <h3>Bloom filter — play with it<\u002Fh3>\n  <div class=\"interactive\" id=\"bloom-widget\">\n    <div class=\"head\"><div class=\"ttl\">Bloom filter (m=24 bits, k=3 hashes)<\u002Fdiv><div class=\"tag\">interactive<\u002Fdiv><\u002Fdiv>\n    <div class=\"controls\" style=\"margin-bottom: 14px\">\n      <input type=\"text\" name=\"bloom-key\" placeholder=\"e.g. apple, grape, banana\">\n      <button class=\"btn primary\" data-act=\"add\">Add to set<\u002Fbutton>\n      <button class=\"btn\" data-act=\"check\">Is it in the set?<\u002Fbutton>\n      <button class=\"btn\" data-act=\"reset\">Reset<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"bloom-bits\"><\u002Fdiv>\n    <div class=\"bloom-log\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout warn\">\n    <div class=\"icn\">!<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">The golden rule of Bloom filters<\u002Fdiv>\n      <p><strong>Never any false negatives.<\u002Fstrong> If the filter says \"no\", the key is definitely not in the set.<br>\n      <strong>Sometimes false positives.<\u002Fstrong> It can say \"yes\" when the answer is actually \"no\" — and that just costs you one\n      wasted disk read. Acceptable.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Bloom filter formulas<\u002Fh3>\n  <div class=\"formula\">p_fp ≈ (1 − e^(−kn/m))^k<\u002Fdiv>\n  <p style=\"text-align:center; color: var(--ink-3); font-size: 14px; margin: -6px 0 14px\">false-positive probability<\u002Fp>\n\n  <div class=\"formula\">k_opt = (m / n) × ln(2)  ≈  0.693 × (m / n)<\u002Fdiv>\n  <p style=\"text-align:center; color: var(--ink-3); font-size: 14px; margin: -6px 0 14px\">optimal number of hash functions<\u002Fp>\n\n  <div class=\"formula\">m = − (n × ln(p_fp)) / (ln 2)²<\u002Fdiv>\n  <p style=\"text-align:center; color: var(--ink-3); font-size: 14px; margin: -6px 0 14px\">required bits for a target false-positive rate<\u002Fp>\n\n  <h4>Worked example<\u002Fh4>\n  <div class=\"card\">\n    <p><strong>Goal:<\u002Fstrong> store <code class=\"inline\">n = 1000<\u002Fcode> keys with a 5% false-positive rate (<code class=\"inline\">p_fp = 0.05<\u002Fcode>).<\u002Fp>\n    <p><strong>Step 1 — bits:<\u002Fstrong> <code class=\"inline\">m = -(1000 × ln 0.05) / (ln 2)² = -(1000 × -2.996) / 0.480 ≈ 6235 bits<\u002Fcode> (about 780 bytes).<\u002Fp>\n    <p><strong>Step 2 — hash count:<\u002Fstrong> <code class=\"inline\">k = (6235 / 1000) × ln 2 ≈ 4.32<\u002Fcode> → round to <strong>4 or 5<\u002Fstrong>.<\u002Fp>\n    <p>Answer: ~6235 bits, 4–5 hash functions.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 08 · HBASE ========== -->\n<section class=\"chapter\" id=\"hbase\">\n  <span class=\"eyebrow\">Chapter 08<\u002Fspan>\n  <h2 class=\"chapter-title\">BigTable &amp; HBase<\u002Fh2>\n  <p class=\"lede\">Google's BigTable is a sparse, distributed, sorted map. HBase is the open-source version that runs on HDFS.<\u002Fp>\n\n  <div class=\"analogy\">\n    <div class=\"label\">📒 Phonebook analogy<\u002Fdiv>\n    <p>Think of one giant phonebook sorted alphabetically by name (the <strong>row key<\u002Fstrong>). Each person has groups of facts:\n    \"phone numbers\", \"addresses\", \"emails\" — each group is a <strong>column family<\u002Fstrong>. Within a group you can have any number of\n    entries, and you can keep <strong>multiple versions<\u002Fstrong> of each one with timestamps. Now slice the phonebook into chunks\n    by alphabetical range and put each chunk on a different shelf — those chunks are <strong>regions<\u002Fstrong>.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3>The data model<\u002Fh3>\n  <p>A cell in HBase is identified by:<\u002Fp>\n  <div class=\"formula\">(row_key, column_family : qualifier, timestamp) → value<\u002Fdiv>\n\n  <table class=\"tbl\">\n    <thead><tr><th>Concept<\u002Fth><th>Plain meaning<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Row key<\u002Fstrong><\u002Ftd><td>Unique identifier. Rows are sorted lexicographically — picking good row keys matters a lot.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Column family<\u002Fstrong><\u002Ftd><td>A small fixed group of related columns, defined at table creation. Each family is stored in its own files on disk.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Column qualifier<\u002Fstrong><\u002Ftd><td>Specific column inside a family. Created on the fly — can have millions of qualifiers.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Timestamp<\u002Fstrong><\u002Ftd><td>Multiple versions of the same cell are kept, distinguished by timestamp.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Cell<\u002Fstrong><\u002Ftd><td>The intersection of row × column × timestamp — one actual value.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h4>A tiny example — a \"web pages\" table<\u002Fh4>\n  <div class=\"card\">\n<pre class=\"code\">Row key: <span class=\"str\">\"com.google.www\"<\u002Fspan>   <span class=\"com\">// URL reversed so com.google.* rows cluster together<\u002Fspan>\n  ├─ <span class=\"fn\">contents:<\u002Fspan>           full HTML, multiple timestamped versions\n  └─ <span class=\"fn\">anchor:<\u002Fspan>\n       ├─ cnn.com   = <span class=\"str\">\"CNN\"<\u002Fspan>\n       └─ bbc.com   = <span class=\"str\">\"BBC News\"<\u002Fspan><\u002Fpre>\n  <\u002Fdiv>\n\n  <h3>Regions (BigTable calls them tablets)<\u002Fh3>\n  <p>The table is split horizontally into <strong>regions<\u002Fstrong>, each holding a contiguous range of row keys. When a region grows too big,\n  it splits at the midpoint of its key range. Each region lives on one <strong>RegionServer<\u002Fstrong>, but a RegionServer hosts many regions.\n  Splitting and moving regions is how HBase load-balances and scales.<\u002Fp>\n\n  <h3>HBase architecture<\u002Fh3>\n  <div class=\"diagram\">\n    <svg viewBox=\"0 0 800 360\" role=\"img\" aria-label=\"HBase architecture\">\n      <defs><marker id=\"arr6\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#7A6F65\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n      <g font-family=\"IBM Plex Sans\" font-size=\"13\">\n        <!-- Client -->\n        <rect x=\"40\" y=\"20\" width=\"120\" height=\"44\" rx=\"8\" fill=\"oklch(50% 0.13 250)\"><\u002Frect>\n        <text x=\"100\" y=\"48\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">HBase Client<\u002Ftext>\n\n        <!-- ZooKeeper -->\n        <rect x=\"640\" y=\"20\" width=\"120\" height=\"44\" rx=\"8\" fill=\"oklch(55% 0.13 150)\"><\u002Frect>\n        <text x=\"700\" y=\"48\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">ZooKeeper<\u002Ftext>\n\n        <!-- HMaster -->\n        <rect x=\"340\" y=\"20\" width=\"160\" height=\"44\" rx=\"8\" fill=\"#1E1A16\"><\u002Frect>\n        <text x=\"420\" y=\"48\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">HBase Master<\u002Ftext>\n\n        <!-- RegionServers -->\n        <g>\n          <rect x=\"60\" y=\"130\" width=\"180\" height=\"100\" rx=\"8\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect>\n          <text x=\"150\" y=\"154\" text-anchor=\"middle\" font-weight=\"600\">RegionServer 1<\u002Ftext>\n          <text x=\"150\" y=\"174\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">[Region A] [Region D]<\u002Ftext>\n          <text x=\"150\" y=\"194\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">HLog (WAL)<\u002Ftext>\n          <text x=\"150\" y=\"212\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">MemStore + Block Cache<\u002Ftext>\n\n          <rect x=\"300\" y=\"130\" width=\"180\" height=\"100\" rx=\"8\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect>\n          <text x=\"390\" y=\"154\" text-anchor=\"middle\" font-weight=\"600\">RegionServer 2<\u002Ftext>\n          <text x=\"390\" y=\"174\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">[Region B] [Region E]<\u002Ftext>\n          <text x=\"390\" y=\"194\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">HLog (WAL)<\u002Ftext>\n          <text x=\"390\" y=\"212\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">MemStore + Block Cache<\u002Ftext>\n\n          <rect x=\"540\" y=\"130\" width=\"180\" height=\"100\" rx=\"8\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect>\n          <text x=\"630\" y=\"154\" text-anchor=\"middle\" font-weight=\"600\">RegionServer 3<\u002Ftext>\n          <text x=\"630\" y=\"174\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">[Region C] [Region F]<\u002Ftext>\n          <text x=\"630\" y=\"194\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">HLog (WAL)<\u002Ftext>\n          <text x=\"630\" y=\"212\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">MemStore + Block Cache<\u002Ftext>\n        <\u002Fg>\n\n        <!-- HDFS -->\n        <rect x=\"100\" y=\"280\" width=\"600\" height=\"60\" rx=\"8\" fill=\"oklch(95% 0.03 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n        <text x=\"400\" y=\"304\" text-anchor=\"middle\" font-weight=\"600\" fill=\"oklch(40% 0.13 250)\">HDFS<\u002Ftext>\n        <text x=\"400\" y=\"322\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">HFiles (SSTables) live here, replicated 3×<\u002Ftext>\n\n        <!-- Lines -->\n        <line x1=\"160\" y1=\"42\" x2=\"340\" y2=\"42\" stroke=\"#7A6F65\" stroke-dasharray=\"3 3\"><\u002Fline>\n        <line x1=\"500\" y1=\"42\" x2=\"640\" y2=\"42\" stroke=\"#7A6F65\" stroke-dasharray=\"3 3\"><\u002Fline>\n        <line x1=\"160\" y1=\"56\" x2=\"150\" y2=\"130\" stroke=\"oklch(65% 0.13 60)\" stroke-width=\"2\" marker-end=\"url(#arr6)\"><\u002Fline>\n        <text x=\"60\" y=\"100\" fill=\"oklch(45% 0.13 60)\" font-size=\"11\" font-weight=\"600\">data path (direct)<\u002Ftext>\n        <line x1=\"150\" y1=\"230\" x2=\"150\" y2=\"280\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n        <line x1=\"390\" y1=\"230\" x2=\"390\" y2=\"280\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n        <line x1=\"630\" y1=\"230\" x2=\"630\" y2=\"280\" stroke=\"#7A6F65\" stroke-dasharray=\"2 3\"><\u002Fline>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cap\">HBase architecture. ZooKeeper holds the bootstrap pointer to the META table. The Master assigns regions but is NOT on the read/write path. Clients go directly to RegionServers.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <table class=\"tbl\">\n    <thead><tr><th>Component<\u002Fth><th>Role<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>HBase Master<\u002Fstrong><\u002Ftd><td>Assigns regions to RegionServers, handles schema changes, runs the load balancer.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>RegionServer<\u002Fstrong><\u002Ftd><td>Hosts a set of regions, handles all reads/writes for them.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>ZooKeeper<\u002Fstrong><\u002Ftd><td>Coordination: leader election, configuration, health monitoring, the META-table pointer.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>HDFS<\u002Fstrong><\u002Ftd><td>Underlying storage where HFiles live, replicated 3×.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>HBase storage = LSM tree<\u002Fh3>\n  <p>Inside each RegionServer it is the same LSM idea you just learned:<\u002Fp>\n  <ul>\n    <li><strong>HLog<\u002Fstrong> — the WAL (write-ahead log).<\u002Fli>\n    <li><strong>MemStore<\u002Fstrong> — the in-memory sorted buffer (one per column family).<\u002Fli>\n    <li><strong>HFile<\u002Fstrong> — the on-disk SSTable equivalent.<\u002Fli>\n    <li><strong>Compaction<\u002Fstrong> — merges HFiles in the background.<\u002Fli>\n  <\u002Ful>\n  <p><strong>Write path:<\u002Fstrong> Client → HLog → MemStore → (flush) → HFile on HDFS.<br>\n  <strong>Read path:<\u002Fstrong> MemStore → Block Cache → HFiles (with Bloom filters to skip them).<\u002Fp>\n\n  <h3>How a client looks up a row (tested in 2016 and 2019)<\u002Fh3>\n  <ol class=\"steps\">\n    <li>Client asks <strong>ZooKeeper<\u002Fstrong>: \"where is the META RegionServer?\"<\u002Fli>\n    <li>Client asks the META table: \"which RegionServer hosts the region containing row key <code class=\"inline\">K<\u002Fcode>?\"<\u002Fli>\n    <li>Client talks <strong>directly<\u002Fstrong> to that RegionServer.<\u002Fli>\n    <li>The RegionServer reads from HDFS / its caches, returns the cells.<\u002Fli>\n    <li>Client <strong>caches<\u002Fstrong> the region-to-server mapping so it does not re-do steps 1–2 next time.<\u002Fli>\n  <\u002Fol>\n\n  <div class=\"callout exam\">\n    <div class=\"icn\">★<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Big exam point<\u002Fdiv>\n      <p>The HBase Master is <strong>NOT<\u002Fstrong> on the client–data path. That is exactly how HBase avoids the bottleneck a single master\n      would otherwise be — clients only need it for schema changes, not for everyday reads and writes.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Row store vs column store vs column-family store<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th><\u002Fth><th>Row store<\u002Fth><th>Column store<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td>Storage layout<\u002Ftd><td>All columns of a row together<\u002Ftd><td>Each column stored separately<\u002Ftd><\u002Ftr>\n      <tr><td>Best for<\u002Ftd><td>Reading whole rows, OLTP<\u002Ftd><td>Aggregations over a few columns, OLAP<\u002Ftd><\u002Ftr>\n      <tr><td>Compression<\u002Ftd><td>Lower (mixed types)<\u002Ftd><td>Higher (same type per column)<\u002Ftd><\u002Ftr>\n      <tr><td>Example<\u002Ftd><td>MySQL, PostgreSQL<\u002Ftd><td>Cassandra columns, BigQuery columnar layout<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <p>BigTable / HBase is a <strong>column-family store<\u002Fstrong> — a hybrid. Rows are still units, but columns within a family\n  are stored together in their own files, so reading a few families is cheap.<\u002Fp>\n\n  <h3>Why not just use a normal RDBMS for Big Data? (tested 2016)<\u002Fh3>\n  <ol>\n    <li><strong>Normalisation hurts at scale.<\u002Fstrong> RDBMS splits data into many tables joined by foreign keys. JOINs across\n    billions of rows on many machines are intolerable.<\u002Fli>\n    <li><strong>ACID is too expensive.<\u002Fstrong> Strong consistency needs distributed commit protocols (e.g. 2-phase commit) — fine\n    for hundreds of transactions per second, terrible at internet scale.<\u002Fli>\n  <\u002Fol>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 09 · ZOOKEEPER + DHT ========== -->\n<section class=\"chapter\" id=\"zk\">\n  <span class=\"eyebrow\">Chapter 09<\u002Fspan>\n  <h2 class=\"chapter-title\">ZooKeeper &amp; DHTs<\u002Fh2>\n  <p class=\"lede\">ZooKeeper keeps a distributed system <em>coordinated<\u002Fem>. DHTs (distributed hash tables) let you store data\n  across many nodes without any central boss.<\u002Fp>\n\n  <h3>ZooKeeper<\u002Fh3>\n  <p>A tiny but very reliable service used by HBase, Kafka, Hadoop HA, Cassandra, Solr, and many more. It does <strong>not<\u002Fstrong> store\n  your application data — it stores a tiny amount of metadata that helps everyone agree.<\u002Fp>\n\n  <h4>What ZooKeeper gives you<\u002Fh4>\n  <ul>\n    <li><strong>Leader election<\u002Fstrong> — pick one node as master from a group of candidates.<\u002Fli>\n    <li><strong>Configuration management<\u002Fstrong> — push config to every node consistently.<\u002Fli>\n    <li><strong>Group membership<\u002Fstrong> — know who is alive right now.<\u002Fli>\n    <li><strong>Distributed locks<\u002Fstrong> — only one writer at a time.<\u002Fli>\n    <li><strong>Barriers<\u002Fstrong> — wait until everyone has reached step N before moving on.<\u002Fli>\n  <\u002Ful>\n\n  <h4>ZNodes<\u002Fh4>\n  <p>ZooKeeper's data model is a hierarchical filesystem of <strong>ZNodes<\u002Fstrong>. Each ZNode can hold ~1 MB of data.<\u002Fp>\n  <table class=\"tbl\">\n    <thead><tr><th>ZNode type<\u002Fth><th>Behaviour<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Persistent<\u002Fstrong><\u002Ftd><td>Lives until explicitly deleted.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Ephemeral<\u002Fstrong><\u002Ftd><td>Auto-deleted when the client that made it disconnects. Perfect for \"I am alive\" registration.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Sequential<\u002Fstrong><\u002Ftd><td>Has a monotonically increasing counter appended to its name. Combined with ephemeral → ordered queues, leader election.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <p>Clients can place <strong>watches<\u002Fstrong> on ZNodes — a one-time trigger that fires when the node changes. They must\n  re-register after each notification.<\u002Fp>\n\n  <div class=\"analogy\">\n    <div class=\"label\">🪑 Leader-election analogy<\u002Fdiv>\n    <p>Imagine a queue where everyone takes a sequentially numbered ticket on entry (sequential ZNode). The person with the\n    lowest number is the leader. If they leave (ephemeral ZNode auto-deletes), the next-lowest number becomes leader. No vote,\n    no chaos — just a sorted queue.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3>Distributed Hash Tables (DHTs)<\u002Fh3>\n  <p>What if you do <strong>not<\u002Fstrong> want any central coordinator at all? A DHT spreads key-value pairs across many nodes peer-to-peer.<\u002Fp>\n\n  <h4>Consistent hashing<\u002Fh4>\n  <p>The simplest hash <code class=\"inline\">node = hash(key) % N<\u002Fcode> breaks horribly when you add or remove a node — almost every key has\n  to move. <strong>Consistent hashing<\u002Fstrong> fixes this.<\u002Fp>\n  <ul>\n    <li>Imagine a ring of all possible hash values: <code class=\"inline\">0 → 2ⁿ-1<\u002Fcode>, wrapping around.<\u002Fli>\n    <li>Place each node at one position on the ring (<code class=\"inline\">hash(node_id)<\u002Fcode>).<\u002Fli>\n    <li>Place each key at one position on the ring (<code class=\"inline\">hash(key)<\u002Fcode>).<\u002Fli>\n    <li>Each key is owned by the <strong>next node clockwise<\u002Fstrong>.<\u002Fli>\n    <li>When a node joins or leaves, only the keys \"around\" that node move. The rest stay put.<\u002Fli>\n  <\u002Ful>\n\n  <div class=\"interactive\" id=\"ring-widget\">\n    <div class=\"head\"><div class=\"ttl\">Consistent hashing ring<\u002Fdiv><div class=\"tag\">interactive<\u002Fdiv><\u002Fdiv>\n    <div class=\"ring-wrap\">\n      <svg class=\"ring\" viewBox=\"0 0 400 400\" style=\"background: var(--bg-2); border-radius: 12px;\"><\u002Fsvg>\n      <div class=\"ring-info\">\n        <p>Add a key (e.g. <code class=\"inline\">user:42<\u002Fcode>) and watch which node it lands on. Then add or remove a node and notice that\n        most keys keep their owner — only the few near the change move.<\u002Fp>\n        <div class=\"controls\" style=\"margin: 10px 0\">\n          <input type=\"text\" name=\"ring-key\" placeholder=\"key name e.g. user:42\">\n          <button class=\"btn primary\" data-act=\"add-key\">add key<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"controls\" style=\"margin: 10px 0\">\n          <button class=\"btn\" data-act=\"add-node\">+ add node<\u002Fbutton>\n          <button class=\"btn\" data-act=\"remove-node\">− remove node<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"ring-log mono\" style=\"font-size: 12px; color: var(--ink-3); max-height: 140px; overflow-y: auto; background: var(--bg-2); border-radius: 8px; padding: 8px 10px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h4>Order-preserving hashing<\u002Fh4>\n  <p>A regular hash scatters similar keys all over the ring (great for load balance, bad for range queries). An\n  <strong>order-preserving hash<\u002Fstrong> keeps similar keys near each other on the ring — so <code class=\"inline\">user:101<\u002Fcode>,\n  <code class=\"inline\">user:102<\u002Fcode>, <code class=\"inline\">user:103<\u002Fcode> all land on the same node. This makes\n  <strong>range scans cheap<\u002Fstrong> at the cost of potential hot-spots.<\u002Fp>\n  <p><strong>Cassandra combines both:<\u002Fstrong> consistent hashing for spreading data and load, with an option for order-preserving\n  partitioning (or a clustering key inside a partition) for efficient ordered reads.<\u002Fp>\n\n  <h3>Overlay networks<\u002Fh3>\n  <p>A logical routing layer built on top of the physical network. Each node only knows a small subset of peers (a routing table),\n  and messages hop through the overlay to reach their target. Examples: Chord, Pastry, CAN.<\u002Fp>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 10 · CASSANDRA ========== -->\n<section class=\"chapter\" id=\"cassandra\">\n  <span class=\"eyebrow\">Chapter 10<\u002Fspan>\n  <h2 class=\"chapter-title\">Cassandra<\u002Fh2>\n  <p class=\"lede\">A peer-to-peer wide-column database that prioritises availability. Origin: Facebook (2008). Combines Amazon's\n  Dynamo architecture with Google's BigTable data model.<\u002Fp>\n\n  <div class=\"analogy\">\n    <div class=\"label\">🌐 Branch-office analogy<\u002Fdiv>\n    <p>HBase is one head office with branches that report up. Cassandra is many equal regional offices — any one of them can\n    take your order, and they sync with each other afterwards. If one office is unreachable, the others keep doing business.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3>Architecture — no master<\u002Fh3>\n  <div class=\"diagram\">\n    <svg viewBox=\"0 0 600 400\" role=\"img\" aria-label=\"Cassandra peer-to-peer ring\">\n      <g font-family=\"IBM Plex Sans\" font-size=\"13\">\n        <circle cx=\"300\" cy=\"200\" r=\"140\" fill=\"none\" stroke=\"#D6CCBC\" stroke-dasharray=\"4 4\"><\u002Fcircle>\n        <g>\n          <circle cx=\"300\" cy=\"60\" r=\"32\" fill=\"oklch(55% 0.13 30)\"><\u002Fcircle><text x=\"300\" y=\"64\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">N1<\u002Ftext>\n          <circle cx=\"440\" cy=\"200\" r=\"32\" fill=\"oklch(55% 0.13 100)\"><\u002Fcircle><text x=\"440\" y=\"204\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">N2<\u002Ftext>\n          <circle cx=\"300\" cy=\"340\" r=\"32\" fill=\"oklch(55% 0.13 200)\"><\u002Fcircle><text x=\"300\" y=\"344\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">N3<\u002Ftext>\n          <circle cx=\"160\" cy=\"200\" r=\"32\" fill=\"oklch(55% 0.13 280)\"><\u002Fcircle><text x=\"160\" y=\"204\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">N4<\u002Ftext>\n        <\u002Fg>\n        <text x=\"300\" y=\"196\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"12\">all nodes equal<\u002Ftext>\n        <text x=\"300\" y=\"214\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"12\">gossip every second<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cap\">Cassandra ring — every node is identical. Clients can write to any node. Nodes gossip with each other to share state.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <ul>\n    <li><strong>Peer-to-peer.<\u002Fstrong> No master. Every node can serve any request.<\u002Fli>\n    <li><strong>Tunable consistency.<\u002Fstrong> You can choose per-query.<\u002Fli>\n    <li><strong>Always writable.<\u002Fstrong> Writes go to the local node; replication happens in the background.<\u002Fli>\n    <li>Survives node and rack failures by design.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Virtual nodes (vnodes)<\u002Fh3>\n  <p>Each physical machine actually owns many positions on the ring (default <strong>256 vnodes<\u002Fstrong> per node). This gives:<\u002Fp>\n  <ul>\n    <li>Better load distribution (your data is spread evenly across all physical machines).<\u002Fli>\n    <li>Faster rebalancing when a node joins or leaves (only a few vnodes move, not a single big slice).<\u002Fli>\n    <li>Heterogeneous clusters work: a more powerful machine can own more vnodes than a weaker one.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Replication strategies<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th>Strategy<\u002Fth><th>Behaviour<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>SimpleStrategy<\u002Fstrong><\u002Ftd><td>Place N replicas on the next N nodes clockwise on the ring.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>NetworkTopologyStrategy<\u002Fstrong><\u002Ftd><td>Spread replicas across data centres and racks (rack-awareness).<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Consistency levels &amp; the quorum formula<\u002Fh3>\n  <p>For every query you can choose how many replicas must answer:<\u002Fp>\n  <table class=\"tbl\">\n    <thead><tr><th>Level<\u002Fth><th>Means<\u002Fth><th>Use when<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>ONE<\u002Fstrong><\u002Ftd><td>1 replica acks<\u002Ftd><td>Lowest latency, weakest consistency<\u002Ftd><\u002Ftr>\n      <tr><td><strong>QUORUM<\u002Fstrong><\u002Ftd><td>⌊N/2⌋+1 replicas ack<\u002Ftd><td>Good middle ground<\u002Ftd><\u002Ftr>\n      <tr><td><strong>ALL<\u002Fstrong><\u002Ftd><td>All N replicas ack<\u002Ftd><td>Strongest consistency, lowest availability<\u002Ftd><\u002Ftr>\n      <tr><td><strong>LOCAL_QUORUM<\u002Fstrong><\u002Ftd><td>Quorum within the local data centre<\u002Ftd><td>Multi-DC deployments<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"formula\">For strong consistency:  R + W &gt; N<\u002Fdiv>\n  <p>where <code class=\"inline\">N<\u002Fcode> = replication factor, <code class=\"inline\">R<\u002Fcode> = read level, <code class=\"inline\">W<\u002Fcode> = write level.<\u002Fp>\n\n  <p><strong>Example:<\u002Fstrong> <code class=\"inline\">N = 3<\u002Fcode>, write with <code class=\"inline\">QUORUM = 2<\u002Fcode>, read with <code class=\"inline\">QUORUM = 2<\u002Fcode> → <code class=\"inline\">2 + 2 = 4 &gt; 3<\u002Fcode> ✓ strongly consistent.<\u002Fp>\n\n  <h3>Cassandra vs HBase<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th><\u002Fth><th>Cassandra<\u002Fth><th>HBase<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td>Architecture<\u002Ftd><td>Peer-to-peer, no master<\u002Ftd><td>Master + RegionServers<\u002Ftd><\u002Ftr>\n      <tr><td>CAP<\u002Ftd><td><strong>AP<\u002Fstrong> — always writable<\u002Ftd><td><strong>CP<\u002Fstrong> — always consistent<\u002Ftd><\u002Ftr>\n      <tr><td>Consistency<\u002Ftd><td>Tunable (ONE → ALL)<\u002Ftd><td>Strong<\u002Ftd><\u002Ftr>\n      <tr><td>Single point of failure<\u002Ftd><td>None<\u002Ftd><td>HBase Master (mitigated by HA)<\u002Ftd><\u002Ftr>\n      <tr><td>Write performance<\u002Ftd><td>Very high<\u002Ftd><td>High<\u002Ftd><\u002Ftr>\n      <tr><td>Read performance<\u002Ftd><td>Good<\u002Ftd><td>Better for random reads<\u002Ftd><\u002Ftr>\n      <tr><td>Multi-data-centre<\u002Ftd><td>First-class support<\u002Ftd><td>Possible but harder<\u002Ftd><\u002Ftr>\n      <tr><td>Query language<\u002Ftd><td>CQL<\u002Ftd><td>Java API / Thrift<\u002Ftd><\u002Ftr>\n      <tr><td>Best for<\u002Ftd><td>High availability, geo-distribution, write-heavy<\u002Ftd><td>Strong consistency, random reads on huge tables<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Cassandra data model<\u002Fh3>\n  <ul>\n    <li><strong>Keyspace<\u002Fstrong> = a database.<\u002Fli>\n    <li><strong>Table<\u002Fstrong> (a.k.a. column family) — same idea as HBase.<\u002Fli>\n    <li><strong>Partition key<\u002Fstrong> — determines which node stores the row.<\u002Fli>\n    <li><strong>Clustering key<\u002Fstrong> — sorts rows inside a partition.<\u002Fli>\n    <li><strong>Primary key<\u002Fstrong> = partition key + clustering keys.<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 11 · CLUSTER + ETHICS ========== -->\n<section class=\"chapter\" id=\"cluster\">\n  <span class=\"eyebrow\">Chapter 11<\u002Fspan>\n  <h2 class=\"chapter-title\">Cluster management &amp; ethics<\u002Fh2>\n  <p class=\"lede\">How clusters actually run software at scale, and the legal/ethical rules you must respect when handling\n  people's data.<\u002Fp>\n\n  <h3>Cluster managers<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th>System<\u002Fth><th>What it does<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>YARN<\u002Fstrong><\u002Ftd><td>Hadoop's built-in resource negotiator (v2+). Hands out compute slots to MapReduce, Spark, etc.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Mesos<\u002Fstrong><\u002Ftd><td>Apache project, two-level scheduling, can run many frameworks side by side.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Kubernetes<\u002Fstrong><\u002Ftd><td>Container orchestrator. Now the dominant platform. Handles deployment, scaling, restarts, networking.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Containers vs Virtual Machines<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th><\u002Fth><th>Container<\u002Fth><th>VM<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td>Startup<\u002Ftd><td>Seconds<\u002Ftd><td>Minutes<\u002Ftd><\u002Ftr>\n      <tr><td>Overhead<\u002Ftd><td>Low — shares host kernel<\u002Ftd><td>High — full OS each<\u002Ftd><\u002Ftr>\n      <tr><td>Isolation<\u002Ftd><td>Process-level (namespaces, cgroups)<\u002Ftd><td>Hardware-level (separate kernel)<\u002Ftd><\u002Ftr>\n      <tr><td>Image size<\u002Ftd><td>MBs<\u002Ftd><td>GBs<\u002Ftd><\u002Ftr>\n      <tr><td>Portability<\u002Ftd><td>Very portable<\u002Ftd><td>Less portable<\u002Ftd><\u002Ftr>\n      <tr><td>Examples<\u002Ftd><td>Docker, Podman<\u002Ftd><td>VMware, KVM, VirtualBox<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Kubernetes — what makes it useful<\u002Fh3>\n  <ul>\n    <li><strong>Declarative<\u002Fstrong> — you describe the desired state (\"I want 5 copies of this container\"), Kubernetes makes it so.<\u002Fli>\n    <li><strong>Self-healing<\u002Fstrong> — if a container or node dies, it restarts elsewhere.<\u002Fli>\n    <li><strong>Heterogeneous hardware<\u002Fstrong> — runs the same workload on many machine types, abstracting away the differences.<\u002Fli>\n    <li><strong>Scaling<\u002Fstrong> — automatically scales up under load and back down when idle.<\u002Fli>\n    <li><strong>Cloud-portable<\u002Fstrong> — runs on any cloud or on bare metal.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Legal &amp; ethical considerations<\u002Fh3>\n\n  <h4>GDPR — the rules you really must know<\u002Fh4>\n  <ul>\n    <li><strong>Consent<\u002Fstrong> — you can only collect personal data if the user agreed, and they can withdraw consent any time.<\u002Fli>\n    <li><strong>Purpose limitation<\u002Fstrong> — data collected for \"delivery tracking\" cannot be silently reused to train AI.<\u002Fli>\n    <li><strong>Data minimisation<\u002Fstrong> — collect the least amount of data needed.<\u002Fli>\n    <li><strong>Right to erasure<\u002Fstrong> — users can ask for their data to be deleted.<\u002Fli>\n    <li><strong>Applies to EU citizens' data<\u002Fstrong> — even if your company is outside the EU.<\u002Fli>\n  <\u002Ful>\n\n  <h4>Ethical issues that come up in scenario questions<\u002Fh4>\n  <ul>\n    <li><strong>Privacy<\u002Fstrong> — collecting / using personal data without informed consent.<\u002Fli>\n    <li><strong>Bias<\u002Fstrong> — algorithms trained on biased data produce biased results (hiring, policing, lending).<\u002Fli>\n    <li><strong>Transparency<\u002Fstrong> — opaque \"black-box\" decisions about people, with no right of appeal.<\u002Fli>\n    <li><strong>Data ownership<\u002Fstrong> — who owns the truck-driver's sensor data? The driver, the company, or the manufacturer?<\u002Fli>\n    <li><strong>Surveillance<\u002Fstrong> — mass surveillance capabilities.<\u002Fli>\n    <li><strong>Re-identification<\u002Fstrong> — \"anonymised\" data can often be re-identified by combining with other datasets.<\u002Fli>\n    <li><strong>Liability<\u002Fstrong> — if a self-driving AI causes a crash, who is responsible? The driver, the company, the developer?<\u002Fli>\n  <\u002Ful>\n\n  <div class=\"callout exam\">\n    <div class=\"icn\">★<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Answer template for \"legal &amp; ethical implications\"<\u002Fdiv>\n      <p>Pick 3 issues, and for each give <em>two<\u002Fem> points: (1) name the issue (consent, bias, liability…), (2) explain\n      specifically why it matters in <em>this<\u002Fem> scenario. Generic answers about \"privacy\" without naming what data and why\n      lose half the marks.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 12 · QUESTION BANK ========== -->\n<section class=\"chapter\" id=\"question-bank\">\n  <span class=\"eyebrow\">Chapter 12<\u002Fspan>\n  <h2 class=\"chapter-title\">Real exam questions, by topic<\u002Fh2>\n  <p class=\"lede\">Real questions from the 2015–2025 papers. Each is tagged with year, marks and topic, with a model answer\n  you can expand. Try to answer first <em>then<\u002Fem> open the model — it doubles the value.<\u002Fp>\n\n  <h3>5 Vs · \"Is this a Big Data problem?\"<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">5 Vs · scenario<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A satellite imaging company runs 100 satellites streaming 10 MB images every second to HQ for natural-disaster alerting. 20% of satellites are active normally, 50% in hurricane season. They want to double the fleet in 5 years. Is processing these images a Big Data task? List the dimensions and discuss why.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Yes. Three Vs apply:<\u002Fp>\n      <ul>\n        <li><strong>Volume.<\u002Fstrong> 100 satellites × 10 MB/s × 86 400 s = ~86 TB per day even at full capacity. With the planned doubling this will exceed the storage and compute capacity of any single machine.<\u002Fli>\n        <li><strong>Velocity.<\u002Fstrong> Data arrives once per second per active satellite and must be processed in near-real-time to issue alerts — batch overnight is unacceptable.<\u002Fli>\n        <li><strong>Variability.<\u002Fstrong> Active satellites swing between 20% and 50% (hurricane season). The system must absorb the spike without crashing, so static capacity planning will not work.<\u002Fli>\n      <\u002Ful>\n      <p>State each dimension (1 mark), then connect to the scenario (1 mark). 3 + 3 = 6 marks.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">5 Vs · scenario<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A haulage company streams 480p dashcam video (~2 MB/min per truck) over satellite back to HQ. The cheap equipment causes periodic feed loss. Why does processing this constitute a Big Data task?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>Volume.<\u002Fstrong> 80 trucks × 2 MB/min × 60 × 24 = ~230 GB/day of video plus the existing sensor stream. Storing and searching weeks of footage will exceed normal storage.<\u002Fli>\n        <li><strong>Veracity.<\u002Fstrong> Poor-quality equipment drops frames intermittently. The pipeline must detect, tolerate and possibly reconstruct gaps — the data is not clean.<\u002Fli>\n      <\u002Ful>\n      <p>Variety (video + sensor + GPS) is an equally valid second point.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">5 Vs · simple yes/no<\u002Fspan><span class=\"tag marks\">3 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A haulage company with 80 trucks sending 1 packet of text per second wants to expose live truck tracking to ~300 retailers. Does this make it a Big Data problem?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Yes, marginally.<\u002Fstrong> Volume of the raw data is tiny (~80 events/s × ~200 bytes), but two Vs newly apply:<\u002Fp>\n      <ul>\n        <li><strong>Velocity<\u002Fstrong> — going from monthly reports to live tracking means processing must happen as data arrives.<\u002Fli>\n        <li><strong>Variability<\u002Fstrong> — query load now depends on retailer behaviour (300 retailers may poll independently), creating peaky access patterns the old reporting system never had.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>Hardware &amp; mainframe vs commodity<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">Vertical vs horizontal<\u002Fspan><span class=\"tag marks\">8 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A hardware vendor offers a single mainframe to process the satellite data. Discuss why this is not a good option.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Make 4 distinct points (2 marks each):<\u002Fp>\n      <ol>\n        <li><strong>Cost &amp; diminishing returns.<\u002Fstrong> Mainframes are very expensive per unit of compute, and doubling the price rarely doubles the throughput due to physical limits (reticle limit, transistor density).<\u002Fli>\n        <li><strong>Single point of failure.<\u002Fstrong> One machine = one point that, if it dies, takes down all disaster alerting — exactly the workload that must not fail.<\u002Fli>\n        <li><strong>Doesn't grow with the fleet.<\u002Fstrong> The company plans to double its satellites in 5 years. A mainframe cannot be smoothly grown; horizontal scaling can.<\u002Fli>\n        <li><strong>Bad fit for variable load.<\u002Fstrong> Workload swings from 20% to 50% active satellites. A mainframe is sized for the peak and wasted off-peak; commodity clusters can scale elastically.<\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">Parallelism challenges<\u002Fspan><span class=\"tag marks\">8 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">The company decides on horizontal scaling with 3 stages: image splitting (24 sub-images each), variant generation (4 filters each), and classification. Discuss the main challenges of building this.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Pick 4 challenges, name the concept (1 mark) and why it bites here (1 mark):<\u002Fp>\n      <ul>\n        <li><strong>Load balancing.<\u002Fstrong> 24× then 4× fan-out makes the workload uneven — some regions are constant ocean, others have packed cities. Naive round-robin distribution will leave some machines idle.<\u002Fli>\n        <li><strong>Communication overhead.<\u002Fstrong> Each image becomes 96 image-variants flowing between stages. Network is the bottleneck — moving full images between machines will dominate runtime.<\u002Fli>\n        <li><strong>Orchestration.<\u002Fstrong> A master must coordinate the three pipelined stages, knowing which sub-image is at which stage on which machine.<\u002Fli>\n        <li><strong>Fault tolerance.<\u002Fstrong> Cheap commodity machines fail. A failure mid-classification must be detectable and the work retried without losing the original 10 MB image.<\u002Fli>\n        <li><strong>Data splitting.<\u002Fstrong> The split granularity (24 regions × 4 variants = 96 tasks per image) must produce enough tasks to fill the cluster, while not creating millions of tiny files.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>MapReduce job design<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">MapReduce design<\u002Fspan><span class=\"tag marks\">9 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A news aggregator wants to implement automatic summarization in MapReduce. The four stages are: (1) content extraction (article → paragraphs), (2) topic identification per paragraph, (3) grouping paragraphs by topic, (4) summarization per topic. Describe how you would implement this and why.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Stage 1 — Map (extraction):<\u002Fstrong> input <code class=\"inline\">(file_path, article_text)<\u002Fcode> → emit <code class=\"inline\">(paragraph_id, paragraph_text)<\u002Fcode>. Pure transformation, no need for a reducer here — can be chained as map-only.<\u002Fp>\n      <p><strong>Stage 2 — Map (topic identification):<\u002Fstrong> input <code class=\"inline\">(paragraph_id, paragraph_text)<\u002Fcode> → emit <code class=\"inline\">(topic, paragraph_text)<\u002Fcode> for each topic the paragraph mentions. One paragraph can emit several pairs (flatMap-style).<\u002Fp>\n      <p><strong>Stage 3 — Shuffle + Reduce (grouping):<\u002Fstrong> the shuffle naturally groups all paragraphs with the same topic key onto one reducer — this <strong>is<\u002Fstrong> the grouping step, no extra code needed.<\u002Fp>\n      <p><strong>Stage 4 — Reduce (summarization):<\u002Fstrong> input <code class=\"inline\">(topic, list&lt;paragraph_text&gt;)<\u002Fcode> → emit <code class=\"inline\">(topic, summary)<\u002Fcode>.<\u002Fp>\n      <p><strong>Why this design:<\u002Fstrong> stages 1–2 are stateless per-item transformations → Maps. Stage 3 needs items combined by key → Shuffle gives this for free. Stage 4 is per-key aggregation → Reduce. One MapReduce pair covers steps 2–4; step 1 is either a map-only pre-step or merged into stage 2's mapper.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2020 (H)<\u002Fspan><span class=\"tag topic\">MapReduce design · DISTINCT<\u002Fspan><span class=\"tag marks\">5 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">Each line of a dataset has two space-separated integers: weight and volume. Design a MapReduce job that returns all distinct (weight, volume) combinations — i.e. <em>SELECT DISTINCT weight, volume FROM dataset<\u002Fem>.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Map:<\u002Fstrong> for each line, parse the two ints, emit <code class=\"inline\">((weight, volume), null)<\u002Fcode> as key-value.<\u002Fp>\n      <p><strong>Reduce:<\u002Fstrong> for each unique key, emit <code class=\"inline\">(weight, volume)<\u002Fcode> once, ignoring the (null) values.<\u002Fp>\n      <p>The shuffle does the deduplication automatically — equal keys land on the same reducer call. Using a binary concatenation of the two 32-bit ints as the key is more space-efficient than a string.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2020 (H)<\u002Fspan><span class=\"tag topic\">Combiner<\u002Fspan><span class=\"tag marks\">3 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">Extend the DISTINCT solution to use a combiner. Explain any changes you need to the map/reduce functions.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>The <strong>combiner<\u002Fstrong> acts as a mini-reducer that emits one <code class=\"inline\">(key, null)<\u002Fcode> per unique key it sees locally — collapsing duplicates on the map side, so far fewer pairs go through the shuffle. <strong>No changes needed<\u002Fstrong> to the mapper or reducer: input and output types match (key, null) → (key, null), which is required for any combiner.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2020 (H)<\u002Fspan><span class=\"tag topic\">MapReduce execution model<\u002Fspan><span class=\"tag marks\">3 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">Can reducers start executing before all mappers finish? Can they start producing output? Discuss the performance implications.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Reducers <strong>cannot produce output<\u002Fstrong> before all mappers finish — a reducer needs every value for its key, and another mapper might still emit one. But reducers <strong>can start fetching<\u002Fstrong> data while mappers are still running (the <em>slowstart<\u002Fem> mechanism). This overlaps the IO-heavy shuffle with the CPU-heavy map work, improving throughput at the cost of higher peak network usage.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>Hadoop overheads &amp; deployment<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">Hadoop overheads<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">After implementing the news summarizer in Hadoop, the company profiles it. What overhead costs should they expect to find, and why?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Three main Hadoop overheads (do <strong>not<\u002Fstrong> blame the algorithms themselves):<\u002Fp>\n      <ul>\n        <li><strong>Disk I/O between stages.<\u002Fstrong> Each MapReduce phase writes intermediate output to disk and the next phase re-reads it. Chaining several MR jobs multiplies this cost.<\u002Fli>\n        <li><strong>JVM startup per task.<\u002Fstrong> Each task launches a fresh JVM. For many short tasks (news articles are not huge) JVM startup is a significant fraction of total time.<\u002Fli>\n        <li><strong>Shuffle / network.<\u002Fstrong> Sending paragraph texts across the network from mappers to reducers is expensive — especially since the data is in text form and likely uncompressed.<\u002Fli>\n        <li>Also valid: small-files problem (each article is a small file), no caching of repeated lookups, lack of pipelining within a job.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">Hadoop deployment<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A bank wants to deploy Hadoop over terabytes of historical CSV files in different formats. What hardware/configuration design decisions matter?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>NameNode memory sizing.<\u002Fstrong> All metadata must fit in RAM. With many small files of varying formats, NameNode RAM is the limit on how many files you can hold; spec it generously.<\u002Fli>\n        <li><strong>Block size choice.<\u002Fstrong> CSV files are typically smaller than 128 MB. Either compact them into larger sequence files or accept higher NameNode pressure; tuning block size matters.<\u002Fli>\n        <li><strong>InputFormat per file type.<\u002Fstrong> Different CSV-like and bank-specific formats each need a tailored InputFormat so a single job can read them all consistently.<\u002Fli>\n        <li>Also valid: rack-aware topology, compression (Snappy/BZip2 to keep CSVs splittable), replication factor.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">Hadoop classes beyond Map/Reduce<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">Beyond Map, Reduce and the main class — what other classes might a Hadoop developer need to implement?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>InputFormat / RecordReader<\u002Fstrong> — to read the bank's bespoke CSV-like formats correctly.<\u002Fli>\n        <li><strong>OutputFormat<\u002Fstrong> — to write results in a format the legacy report-generation platform can consume.<\u002Fli>\n        <li><strong>Combiner<\u002Fstrong> — to reduce shuffle volume on aggregation operations.<\u002Fli>\n        <li><strong>Custom Partitioner<\u002Fstrong> — if data is skewed (e.g. one big customer dominates), to balance reducer load.<\u002Fli>\n        <li><strong>WritableComparable<\u002Fstrong> key class — for any non-primitive composite keys.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">Hadoop weakness · streaming<\u002Fspan><span class=\"tag marks\">4 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A trading team needs full market statistics every 10 seconds — a List&lt;Price&gt; → Double transformation. Why is this difficult/inefficient in Hadoop?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>Batch-only model.<\u002Fstrong> Hadoop is built for one-shot jobs; rerunning the whole pipeline every 10 seconds carries fresh JVM startup and HDFS write overhead each cycle.<\u002Fli>\n        <li><strong>No streaming primitives.<\u002Fstrong> Hadoop has no concept of a window over a continuous price stream; you would have to re-read the entire input each cycle.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>Spark vs Hadoop<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">Spark advantages<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">What are the primary advantages of implementing the news summarizer in Spark instead of Hadoop?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>In-memory between stages<\u002Fstrong> — paragraph text doesn't need to be written to and re-read from disk between extraction, topic identification, grouping and summarization.<\u002Fli>\n        <li><strong>DAG optimisation<\u002Fstrong> — Spark sees the full 4-stage pipeline and can pipeline narrow operations (extraction + topic identification) into one stage with no shuffle.<\u002Fli>\n        <li><strong>Concise API<\u002Fstrong> — Java lambdas / Scala dramatically reduce boilerplate compared to writing five separate Java MapReduce classes.<\u002Fli>\n        <li>Also: built-in caching for any RDD that is reused (e.g. paragraphs that need re-processing), unified batch + streaming if they later want incremental summarization.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2020 (H)<\u002Fspan><span class=\"tag topic\">Spark DAG · narrow vs wide<\u002Fspan><span class=\"tag marks\">5 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A parent-child RDD dependency is narrow when each parent partition is used by at most one child partition, and wide when each parent partition is used by multiple child partitions. How are these dependencies used to create stages, and how does this affect performance?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Spark groups consecutive narrow dependencies into a single <strong>stage<\u002Fstrong> and pipelines them in memory — no intermediate shuffle, no disk write. A wide dependency forces a <strong>stage boundary<\u002Fstrong>: data is repartitioned across the cluster (a shuffle), which involves writing to local disk and crossing the network.<\u002Fp>\n      <p>Performance impact: stages with only narrow ops are very fast. Wide ops dominate cost because of shuffle I/O — this is why <code class=\"inline\">reduceByKey<\u002Fcode> (with local combine) is far preferable to <code class=\"inline\">groupByKey<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">Spark · stateful training<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A start-up trains AI models on cheap desktops. Each step gives each machine a different batch; every 10 steps the neural networks must be synchronized and redistributed. Why is this more costly in Spark than applications without side-effects?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Type of problem:<\u002Fstrong> stateful, with periodic global synchronization — exactly the workload Spark was <em>not<\u002Fem> designed for.<\u002Fp>\n      <ul>\n        <li><strong>Synchronization is a global wide dependency.<\u002Fstrong> Every 10 steps the entire cluster's state must be brought together — equivalent to a shuffle of the whole model. The slowest machine sets the pace (straggler problem).<\u002Fli>\n        <li><strong>Lineage is broken by mutable state.<\u002Fstrong> Spark recovers from failure by recomputing partitions from the DAG. If a machine's local NN state is lost, recomputing requires redoing many training steps, not just one transformation.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">Streaming benefits<\u002Fspan><span class=\"tag marks\">4 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">If batched training wastes resources (CPU idle while GPU works and vice versa), why might a streaming pipeline help?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>Pipelining.<\u002Fstrong> A streaming model processes records continuously, so while the GPU is updating the model on batch N, the CPU is already preparing batch N+1. Resources overlap instead of alternating.<\u002Fli>\n        <li><strong>No barrier between batches.<\u002Fstrong> Streaming avoids the global \"everyone wait, then everyone go\" pattern, eliminating idle periods at synchronisation points.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>HDFS protocols &amp; NFS comparison<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2020 (H)<\u002Fspan><span class=\"tag topic\">HDFS read protocol · MCQ<\u002Fspan><span class=\"tag marks\">8 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">When an HDFS client reads from a file, it: (a) receives all data through the NameNode, (b) receives only block locations from the NameNode, (c) receives both data and locations from the NameNode, (d) receives both from a DataNode. Choose and explain.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Answer: (b).<\u002Fstrong> The client asks the NameNode only for block locations (and caches them). All actual data flows directly between client and DataNodes. This keeps the NameNode off the critical I/O path and lets the system scale.<\u002Fp>\n      <p>The trade-off is that the NameNode must keep all metadata in RAM with very low latency — limiting the total number of files / blocks the system can hold.<\u002Fp>\n      <p>(a) and (c) would funnel all data through the NameNode → bottleneck.<br>(d) would force every DataNode to know every block's location → enormous broadcasts and DataNode memory pressure.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2020 (H)<\u002Fspan><span class=\"tag topic\">NameNode vs DataNode hardware<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">Which of these is true? (a) NameNode &amp; DataNode have equal specs, (b) NameNode disk &gt; DataNode disk, (c) NameNode RAM &gt; DataNode RAM, (d) DataNode disk and RAM &gt; NameNode. Justify.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Answer: (c).<\u002Fstrong> The NameNode must keep the entire filesystem image in RAM, so it needs substantially more RAM than DataNodes. Its disk needs are modest (just enough for the checkpoint + journal). DataNodes need lots of disk (they store the actual blocks) but only moderate RAM for caching.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">NFS vs HDFS<\u002Fspan><span class=\"tag marks\">8 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A shipping company stores large audio logs and many small sensor files on NFS + RAID6. They're considering HDFS. What are the advantages and disadvantages?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Four points, each \"difference + impact\":<\u002Fp>\n      <ul>\n        <li><strong>Scalability.<\u002Fstrong> HDFS adds DataNodes horizontally; NFS is limited by a single server's I/O. As the fleet grows, NFS will saturate.<\u002Fli>\n        <li><strong>Resilience.<\u002Fstrong> HDFS replicates blocks 3× across machines and racks; NFS relies on RAID6 at one server. A whole server fire still kills the NFS data until the weekly off-site restore.<\u002Fli>\n        <li><strong>File-size fit (disadvantage of HDFS here!).<\u002Fstrong> HDFS is poor for many small files — each file uses NameNode metadata. The sensor data (lots of tiny files) would need merging or HBase, NFS handles them natively.<\u002Fli>\n        <li><strong>Access pattern.<\u002Fstrong> HDFS is write-once read-many, optimised for streaming throughput; NFS supports random read/write of arbitrary chunks. If logs are frequently appended or edited, NFS wins.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">Distributed vs decentralized<\u002Fspan><span class=\"tag marks\">3 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">What is the difference between distributed and decentralized storage?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>Distributed<\u002Fstrong> — data is spread across many machines but a <strong>central coordinator<\u002Fstrong> (like the HDFS NameNode) manages metadata
