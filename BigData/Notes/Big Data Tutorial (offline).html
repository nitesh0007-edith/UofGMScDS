. Coordinator is a single point of failure if not mitigated.<\u002Fli>\n        <li><strong>Decentralized<\u002Fstrong> — <strong>no central coordinator<\u002Fstrong>. Nodes are equal peers, manage themselves through gossip / DHT (like Cassandra).<\u002Fli>\n      <\u002Ful>\n      <p>Contrast: distributed is simpler to reason about but the coordinator is a bottleneck and SPOF; decentralized has no SPOF but requires more complex protocols (consensus, gossip, vector clocks).<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>CAP &amp; BASE<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">multi-year<\u002Fspan><span class=\"tag topic\">CAP classification<\u002Fspan><span class=\"tag marks\">~6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">Classify HDFS, HBase and Cassandra under CAP. What do they sacrifice?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>HDFS — CP.<\u002Fstrong> NameNode is authoritative (consistent), data is replicated across racks (partition-tolerant), but if the NameNode is unreachable the cluster is unavailable.<\u002Fli>\n        <li><strong>HBase — CP.<\u002Fstrong> Each region has one RegionServer; reads/writes are strongly consistent. During a network partition, regions on the unreachable side are unavailable.<\u002Fli>\n        <li><strong>Cassandra — AP.<\u002Fstrong> Any node accepts any write. During a partition, both sides keep serving — but reads may return stale data until the cluster heals (eventual consistency). Tunable per query via R+W&gt;N.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>HBase storage &amp; LSM trees<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">HBase write path · LSM<\u002Fspan><span class=\"tag marks\">7 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A crypto exchange uses HBase for trade data. Summarize the storage mechanism HBase RegionServers use and describe how it enables fast access for recent trades.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Mechanism: <strong>LSM tree<\u002Fstrong>.<\u002Fp>\n      <p>Write steps:<\u002Fp>\n      <ol>\n        <li>Append the trade to the <strong>HLog (WAL)<\u002Fstrong> on disk for durability.<\u002Fli>\n        <li>Insert it into the in-memory <strong>MemStore<\u002Fstrong>, sorted by row key.<\u002Fli>\n        <li>When the MemStore fills, <strong>flush<\u002Fstrong> it to disk as a new immutable <strong>HFile<\u002Fstrong>.<\u002Fli>\n        <li>In the background, <strong>compact<\u002Fstrong> HFiles to merge them and reclaim space.<\u002Fli>\n      <\u002Fol>\n      <p>Recent trades are still in the MemStore (RAM), so reading them is a hashmap lookup — no disk seek. Older trades hit HFiles, but Bloom filters skip irrelevant ones quickly.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">HFile size trade-off<\u002Fspan><span class=\"tag marks\">3 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">An engineer says writing few large HFiles speeds up index lookup. Is this true?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Partially true, but misleading.<\u002Fstrong> Fewer HFiles do mean fewer indexes to consult, which helps lookups for keys that <em>are<\u002Fem> in the most-recent HFile. But for older trades the engine still must <em>load and scan<\u002Fem> a very large HFile into memory — that scan time dominates, and is exactly what the team observed. The right fix is more frequent flushes plus Bloom filters, not larger files.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>Cassandra &amp; consistent hashing<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">Cassandra vs HBase<\u002Fspan><span class=\"tag marks\">4 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">The exchange worries one regional government may demand seizing data from their single HBase instance. What benefits would Cassandra bring?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <ul>\n        <li><strong>Geo-distribution.<\u002Fstrong> Cassandra's NetworkTopologyStrategy lets you place replicas across data centres in different jurisdictions, so no single government has the full data.<\u002Fli>\n        <li><strong>No master.<\u002Fstrong> Cassandra is peer-to-peer, so seizing one node does not give control of the cluster, and the rest stays available.<\u002Fli>\n        <li>Also: tunable consistency (LOCAL_QUORUM keeps lookups within a region for latency &amp; legal isolation); high write throughput; no SPOF.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2023 (H)<\u002Fspan><span class=\"tag topic\">Consistent + order-preserving hashing<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">Describe consistent hashing and order-preserving hashing, then explain how Cassandra combines them.<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Consistent hashing<\u002Fstrong> places nodes and keys on a ring (<code class=\"inline\">0 → 2ⁿ−1<\u002Fcode>). Each key is owned by the next node clockwise. Adding or removing a node only moves the keys in a small arc around the changed node — no global re-hash.<\u002Fp>\n      <p><strong>Order-preserving hashing<\u002Fstrong> is a hash where similar inputs produce nearby outputs. Sequential keys (<code class=\"inline\">user:100<\u002Fcode>, <code class=\"inline\">user:101<\u002Fcode>…) land near each other on the ring, so range queries are local. Risk: hot-spots on popular ranges.<\u002Fp>\n      <p><strong>In Cassandra:<\u002Fstrong> consistent hashing on the <strong>partition key<\u002Fstrong> spreads load across nodes (with virtual nodes for finer balance). Within a partition, the <strong>clustering key<\u002Fstrong> orders rows — giving order-preserving behaviour inside a partition without sacrificing global load balance.<\u002Fp>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">Kubernetes<\u002Fspan><span class=\"tag marks\">5 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">Deploying Cassandra across heterogeneous hardware in many regions is hard. What is Kubernetes and how would it help?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p><strong>Kubernetes<\u002Fstrong> is an open-source container orchestration platform. It runs application containers across many machines and provides declarative deployment, scaling, networking and self-healing.<\u002Fp>\n      <p>How it helps here:<\u002Fp>\n      <ul>\n        <li><strong>Hardware abstraction.<\u002Fstrong> Containers run the same way on different machine types, so heterogeneous hardware is no longer a manual problem.<\u002Fli>\n        <li><strong>Self-healing.<\u002Fstrong> If a Cassandra node dies, K8s automatically restarts it on a healthy machine — fixing the maintenance pain.<\u002Fli>\n        <li><strong>Declarative ops.<\u002Fstrong> One YAML describes how many Cassandra nodes per region — easier to deploy and audit than per-region hand-tuned scripts.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>Ethics &amp; GDPR<\u002Fh3>\n\n  <div class=\"exam-q\">\n    <div class=\"meta\"><span class=\"tag year\">2025 (M)<\u002Fspan><span class=\"tag topic\">Ethics · AI training<\u002Fspan><span class=\"tag marks\">6 marks<\u002Fspan><\u002Fdiv>\n    <p class=\"q\">A haulage company wants to use truck sensor and dashcam data to train a self-driving AI. What are the legal and ethical implications?<\u002Fp>\n    <details class=\"ans\"><summary>Show model answer<\u002Fsummary><div class=\"body\">\n      <p>Three points, two marks each:<\u002Fp>\n      <ul>\n        <li><strong>Consent &amp; purpose limitation (GDPR).<\u002Fstrong> The drivers consented to the data being collected for company reports, not for AI training. Reusing it for a different purpose requires fresh, explicit consent — and the data may include identifiable individuals (other drivers, pedestrians caught on dashcam).<\u002Fli>\n        <li><strong>Liability &amp; transparency.<\u002Fstrong> If the AI causes a crash, who is responsible — the company, the driver who supervised it, the model trainer? Black-box ML decisions make accountability unclear and create regulatory risk.<\u002Fli>\n        <li><strong>Bias &amp; safety.<\u002Fstrong> The training data only covers the routes the company already drives. The model may fail in unseen conditions (foreign roads, snow), and biased data could cause systematic safety failures with serious harm.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n\n  <hr class=\"rule\">\n\n  <h3>Practice questions (no model answer — try yourself)<\u002Fh3>\n  <div class=\"card\">\n    <p>If you've worked through everything above, try these older questions cold. Time yourself.<\u002Fp>\n    <ol>\n      <li><strong>2018:<\u002Fstrong> Explain HBase's on-disk storage format. How are cells laid out? Why is this different from a row-store RDBMS?<\u002Fli>\n      <li><strong>2018:<\u002Fstrong> Given <code class=\"inline\">n = 5000<\u002Fcode> elements and a target false-positive rate of 1%, compute m and k for a Bloom filter.<\u002Fli>\n      <li><strong>2019:<\u002Fstrong> Describe how HBase looks up a row by key, step by step. Why is the HBase Master not on the data path?<\u002Fli>\n      <li><strong>2019:<\u002Fstrong> Compare HBase and Cassandra under CAP. Give a concrete scenario where you would pick each.<\u002Fli>\n      <li><strong>2017:<\u002Fstrong> Describe the HDFS write pipeline. What happens if a DataNode in the middle of the pipeline dies?<\u002Fli>\n      <li><strong>2016:<\u002Fstrong> Why is a normal RDBMS not a good fit for storing Google-scale web data?<\u002Fli>\n      <li><strong>2015:<\u002Fstrong> Design a MapReduce job that computes the <strong>average<\u002Fstrong> rating per movie from a CSV of <code class=\"inline\">(userId, movieId, rating)<\u002Fcode> lines. Include a combiner.<\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 13 · FORMULAS ========== -->\n<section class=\"chapter\" id=\"formulas\">\n  <span class=\"eyebrow\">Chapter 13<\u002Fspan>\n  <h2 class=\"chapter-title\">Formula quick reference<\u002Fh2>\n  <p class=\"lede\">One page you can glance at during revision. Almost everything quantitative in this course comes from these.<\u002Fp>\n\n  <h4>Parallelism<\u002Fh4>\n  <div class=\"formula\">Speed-up(n, p) = Serial_Time(n) / Parallel_Time(n, p)<\u002Fdiv>\n  <p style=\"color: var(--ink-3); font-size: 14px\">Ideal (linear) = p. Realistic: <code class=\"inline\">0 &lt; speed-up ≤ p<\u002Fcode>.<\u002Fp>\n\n  <h4>HDFS block-size derivation<\u002Fh4>\n  <div class=\"formula\">block_size ≈ transfer_rate × seek_time × 100<\u002Fdiv>\n  <p style=\"color: var(--ink-3); font-size: 14px\">At 100 MB/s and 10 ms seek → ~100 MB → rounded to 128 MB. Keeps seek under 1% of read time.<\u002Fp>\n\n  <h4>Bloom filter<\u002Fh4>\n  <div class=\"formula\">p_fp ≈ (1 − e^(−kn/m))^k<\u002Fdiv>\n  <div class=\"formula\">k_opt = (m / n) × ln 2  ≈  0.693 × (m / n)<\u002Fdiv>\n  <div class=\"formula\">m = − (n × ln p_fp) / (ln 2)²<\u002Fdiv>\n\n  <h4>Quorum / consistency<\u002Fh4>\n  <div class=\"formula\">Strong consistency:  R + W &gt; N<\u002Fdiv>\n  <div class=\"formula\">Quorum size = ⌊N/2⌋ + 1<\u002Fdiv>\n\n  <h4>Replica placement (HDFS default)<\u002Fh4>\n  <p style=\"color: var(--ink-3); font-size: 14px\">R1 = writer's node, R2 = different rack, R3 = same rack as R2 but different node.<\u002Fp>\n\n  <h4>Common latency numbers<\u002Fh4>\n  <table class=\"tbl\">\n    <thead><tr><th>Operation<\u002Fth><th>Latency<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td>L1 cache<\u002Ftd><td>~1 ns<\u002Ftd><\u002Ftr>\n      <tr><td>L2 cache<\u002Ftd><td>~4 ns<\u002Ftd><\u002Ftr>\n      <tr><td>RAM<\u002Ftd><td>~100 ns<\u002Ftd><\u002Ftr>\n      <tr><td>SSD<\u002Ftd><td>~100 µs<\u002Ftd><\u002Ftr>\n      <tr><td>HDD seek<\u002Ftd><td>~10 ms<\u002Ftd><\u002Ftr>\n      <tr><td>LAN round-trip<\u002Ftd><td>~1 ms<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 14 · CHECKLIST ========== -->\n<section class=\"chapter\" id=\"checklist\">\n  <span class=\"eyebrow\">Chapter 14<\u002Fspan>\n  <h2 class=\"chapter-title\">Night-before checklist<\u002Fh2>\n  <p class=\"lede\">If you tick every item below, you are in great shape for the exam. Each point is something the markers\n  reward.<\u002Fp>\n\n  <h3>Concepts you must be able to recite cold<\u002Fh3>\n  <ul class=\"check-list\">\n    <li>The 5 Vs (Volume, Variety, Velocity, Veracity, Variability) — and at least one scenario example for each.<\u002Fli>\n    <li>Vertical vs horizontal scaling — and the 4 reasons a mainframe is a bad fit.<\u002Fli>\n    <li>MapReduce flow: <strong>Input → Split → Map → Sort → Shuffle → Reduce → Output<\u002Fstrong>.<\u002Fli>\n    <li>The 4 main Hadoop weaknesses (small files, disk between stages, no caching, verbose Java).<\u002Fli>\n    <li>Spark RDD: <strong>Resilient, Distributed, Dataset<\u002Fstrong> + lazy transformations vs actions.<\u002Fli>\n    <li>Narrow vs wide dependencies — and what causes a stage boundary.<\u002Fli>\n    <li>HDFS write &amp; read pipeline — including the <em>recovery<\u002Fem> path (~40% of marks).<\u002Fli>\n    <li>HDFS rack-aware replica placement (R1 local, R2 remote rack, R3 same as R2).<\u002Fli>\n    <li>CAP — define C, A, P; classify HDFS (CP), HBase (CP), Cassandra (AP), NFS (CA).<\u002Fli>\n    <li>ACID vs BASE — what each letter stands for.<\u002Fli>\n    <li>LSM tree: WAL → MemTable → SSTable → Compaction; tombstones for deletes.<\u002Fli>\n    <li>Bloom filter: no false negatives, possible false positives; three formulas.<\u002Fli>\n    <li>HBase data model: (row_key, family:qualifier, timestamp) → value.<\u002Fli>\n    <li>HBase lookup: ZooKeeper → META → RegionServer; Master NOT in data path.<\u002Fli>\n    <li>ZooKeeper ZNode types (persistent / ephemeral / sequential) + leader-election pattern.<\u002Fli>\n    <li>Consistent hashing &amp; the order-preserving variant.<\u002Fli>\n    <li>Cassandra: peer-to-peer, AP, tunable consistency, R+W&gt;N.<\u002Fli>\n    <li>Cassandra vs HBase trade-offs.<\u002Fli>\n    <li>Containers vs VMs; Kubernetes core benefits.<\u002Fli>\n    <li>GDPR principles (consent, purpose limitation, data minimisation, right to erasure).<\u002Fli>\n  <\u002Ful>\n\n  <h3>Exam-day rules<\u002Fh3>\n  <ul class=\"check-list\">\n    <li>Read the full paper first (2 minutes). Note the marks.<\u002Fli>\n    <li>Always answer in pairs: <strong>\"It is X. This matters because Y.\"<\u002Fstrong><\u002Fli>\n    <li>For scenario questions: use the company's own words from the question in your answer.<\u002Fli>\n    <li>For \"design a MapReduce job\": always 5 numbered parts — Input, Map, Shuffle, Reduce, Output, with sample records.<\u002Fli>\n    <li>For comparison questions: 4 distinct points, each \"difference + impact\".<\u002Fli>\n    <li>If stuck: write down everything you know about the topic in bullets — partial credit accumulates fast.<\u002Fli>\n    <li>~1.2 minutes per mark. Move on after 30 minutes per question; come back to gaps at the end.<\u002Fli>\n  <\u002Ful>\n\n  <div class=\"callout exam\">\n    <div class=\"icn\">★<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">One last thing<\u002Fdiv>\n      <p>You probably know more than you think. The Big Data exam rewards <strong>structured<\u002Fstrong> answers, not encyclopaedic recall.\n      A clean five-bullet answer that names things and explains why beats a wall of unstructured prose every time. Good luck. 🍀<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n<\u002Fdiv>\n\n<script src=\"29bc727e-a83d-4a1d-a00d-0e52b812c3c1\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
