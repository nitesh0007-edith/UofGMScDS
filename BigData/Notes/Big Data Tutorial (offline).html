  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"c2ba3136-141e-4916-92a2-48370702d9c4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ================= Big Data Tutorial — Stylesheet ================= */\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\n:root {\n  --bg: #FAF7F2;\n  --bg-2: #F2EDE4;\n  --bg-card: #FFFDF8;\n  --ink: #1E1A16;\n  --ink-2: #4A413A;\n  --ink-3: #7A6F65;\n  --line: #E5DDD0;\n  --line-2: #D6CCBC;\n  --accent: oklch(50% 0.13 250);\n  --accent-soft: oklch(95% 0.03 250);\n  --warm: oklch(65% 0.13 60);\n  --warm-soft: oklch(95% 0.05 60);\n  --green: oklch(55% 0.12 150);\n  --green-soft: oklch(95% 0.04 150);\n  --red: oklch(55% 0.16 25);\n  --red-soft: oklch(95% 0.04 25);\n  --shadow: 0 1px 0 rgba(30,26,22,0.04), 0 10px 30px -16px rgba(30,26,22,0.18);\n  --radius: 14px;\n  --radius-sm: 8px;\n}\n\nhtml, body { background: var(--bg); color: var(--ink); }\n\nbody {\n  font-family: 'IBM Plex Serif', Georgia, serif;\n  font-size: 17px;\n  line-height: 1.7;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, .ui {\n  font-family: 'IBM Plex Sans', system-ui, sans-serif;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n}\n\ncode, pre, kbd, .mono {\n  font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;\n  font-size: 0.92em;\n}\n\na { color: var(--accent); text-decoration: none; }\na:hover { text-decoration: underline; text-underline-offset: 3px; }\n\n/* ============ Layout ============ */\n\n.app {\n  display: grid;\n  grid-template-columns: 280px minmax(0, 1fr);\n  min-height: 100vh;\n}\n\naside.sidebar {\n  position: sticky; top: 0; align-self: start;\n  height: 100vh; overflow-y: auto;\n  background: var(--bg-2);\n  border-right: 1px solid var(--line);\n  padding: 28px 22px 40px;\n}\n\n.sidebar .brand {\n  display: flex; align-items: center; gap: 10px;\n  margin-bottom: 18px;\n  padding-bottom: 16px; border-bottom: 1px solid var(--line);\n}\n.brand .mark {\n  width: 36px; height: 36px; border-radius: 8px;\n  background: var(--ink); color: var(--bg);\n  display: grid; place-items: center;\n  font-family: 'IBM Plex Sans'; font-weight: 700; font-size: 14px;\n  letter-spacing: -0.02em;\n}\n.brand .name { font-family: 'IBM Plex Sans'; font-weight: 600; font-size: 16px; line-height: 1.2; }\n.brand .name small { display: block; font-weight: 400; color: var(--ink-3); font-size: 12px; }\n\n.sidebar nav { font-family: 'IBM Plex Sans'; font-size: 14px; }\n.sidebar nav .group { color: var(--ink-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; margin: 18px 8px 6px; }\n.sidebar nav a {\n  display: flex; align-items: center; gap: 10px;\n  padding: 7px 10px; border-radius: 7px;\n  color: var(--ink-2); font-weight: 500;\n}\n.sidebar nav a:hover { background: var(--bg-card); text-decoration: none; color: var(--ink); }\n.sidebar nav a.active { background: var(--ink); color: var(--bg); }\n.sidebar nav a .num { color: var(--ink-3); font-size: 12px; min-width: 18px; font-variant-numeric: tabular-nums; }\n.sidebar nav a.active .num { color: var(--bg-2); }\n\nmain {\n  max-width: 880px;\n  padding: 56px 64px 120px;\n  margin: 0 auto;\n}\n\n@media (max-width: 980px) {\n  .app { grid-template-columns: 1fr; }\n  aside.sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); }\n  main { padding: 32px 22px 80px; }\n}\n\n/* ============ Section primitives ============ */\n\nsection.chapter {\n  margin: 0 0 96px;\n  scroll-margin-top: 24px;\n}\n\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: 'IBM Plex Sans'; font-size: 12px; font-weight: 600;\n  color: var(--accent); letter-spacing: 0.16em; text-transform: uppercase;\n  margin-bottom: 14px;\n}\n.eyebrow::before { content: \"\"; width: 22px; height: 1px; background: var(--accent); }\n\nh1.title {\n  font-size: 56px; line-height: 1.02; font-weight: 600;\n  letter-spacing: -0.02em; margin-bottom: 20px;\n}\nh2.chapter-title {\n  font-size: 36px; line-height: 1.1; font-weight: 600;\n  letter-spacing: -0.015em; margin: 0 0 12px;\n}\nh3 {\n  font-size: 22px; line-height: 1.25; font-weight: 600;\n  margin: 36px 0 12px;\n}\nh4 {\n  font-size: 17px; font-weight: 600;\n  margin: 22px 0 8px;\n  font-family: 'IBM Plex Sans';\n}\np { margin: 0 0 14px; }\np + p { margin-top: 0; }\n\nmain p, main li { color: var(--ink-2); }\nmain p strong, main li strong { color: var(--ink); font-weight: 600; }\n\n.lede {\n  font-size: 19px; line-height: 1.55; color: var(--ink-2);\n  margin-bottom: 28px;\n}\n\nul, ol { padding-left: 22px; margin: 0 0 16px; }\nli { margin: 6px 0; }\n\nhr.rule { border: 0; height: 1px; background: var(--line); margin: 36px 0; }\n\n/* ============ Cards / callouts ============ */\n\n.card {\n  background: var(--bg-card);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 22px 24px;\n  margin: 18px 0;\n  box-shadow: var(--shadow);\n}\n\n.callout {\n  border-radius: var(--radius);\n  padding: 16px 18px 16px 18px;\n  margin: 18px 0;\n  display: grid;\n  grid-template-columns: 22px 1fr;\n  gap: 12px;\n  border: 1px solid var(--line);\n}\n.callout .icn {\n  width: 22px; height: 22px; border-radius: 50%;\n  display: grid; place-items: center;\n  font-family: 'IBM Plex Sans'; font-weight: 700; font-size: 12px;\n  color: white; margin-top: 2px;\n}\n.callout p { margin: 0; color: var(--ink-2); }\n.callout p + p { margin-top: 8px; }\n.callout .ttl { font-family: 'IBM Plex Sans'; font-weight: 600; color: var(--ink); margin-bottom: 4px; font-size: 14px; letter-spacing: 0.02em; text-transform: uppercase; }\n\n.callout.tip { background: var(--accent-soft); border-color: oklch(85% 0.05 250); }\n.callout.tip .icn { background: var(--accent); }\n.callout.warn { background: var(--warm-soft); border-color: oklch(85% 0.07 60); }\n.callout.warn .icn { background: var(--warm); }\n.callout.exam { background: var(--green-soft); border-color: oklch(85% 0.06 150); }\n.callout.exam .icn { background: var(--green); }\n.callout.danger { background: var(--red-soft); border-color: oklch(85% 0.07 25); }\n.callout.danger .icn { background: var(--red); }\n\n.analogy {\n  background: linear-gradient(180deg, #FFF8E9, #FFF3DC);\n  border: 1px solid oklch(85% 0.07 80);\n  border-radius: var(--radius);\n  padding: 18px 22px;\n  margin: 16px 0;\n}\n.analogy .label {\n  font-family: 'IBM Plex Sans'; font-weight: 600;\n  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: oklch(45% 0.12 60); margin-bottom: 4px;\n}\n.analogy p { color: var(--ink); margin: 0; }\n.analogy p + p { margin-top: 8px; }\n\n/* ============ Tables ============ */\n\n.tbl {\n  width: 100%;\n  border-collapse: separate;\n  border-spacing: 0;\n  font-size: 15px;\n  margin: 18px 0;\n  background: var(--bg-card);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  overflow: hidden;\n  font-family: 'IBM Plex Sans';\n}\n.tbl th, .tbl td { padding: 11px 14px; text-align: left; vertical-align: top; }\n.tbl th {\n  background: var(--bg-2); color: var(--ink);\n  font-weight: 600; font-size: 13px;\n  letter-spacing: 0.02em; border-bottom: 1px solid var(--line);\n}\n.tbl tr:not(:last-child) td { border-bottom: 1px solid var(--line); }\n.tbl td { color: var(--ink-2); }\n.tbl td strong { color: var(--ink); }\n\n/* ============ Code blocks ============ */\n\npre.code {\n  background: #1E1A16;\n  color: #F2EDE4;\n  padding: 16px 18px;\n  border-radius: var(--radius);\n  overflow-x: auto;\n  margin: 14px 0;\n  font-size: 13.5px;\n  line-height: 1.6;\n}\npre.code .kw { color: oklch(75% 0.13 60); }\npre.code .str { color: oklch(75% 0.13 150); }\npre.code .com { color: #7A6F65; font-style: italic; }\npre.code .fn { color: oklch(75% 0.13 250); }\n\ncode.inline {\n  background: var(--bg-2);\n  padding: 1px 6px;\n  border-radius: 4px;\n  border: 1px solid var(--line);\n  color: var(--ink);\n}\n\n/* ============ Diagram chrome ============ */\n\n.diagram {\n  background: var(--bg-card);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 20px;\n  margin: 22px 0;\n  box-shadow: var(--shadow);\n}\n.diagram .cap {\n  margin-top: 10px;\n  font-family: 'IBM Plex Sans'; font-size: 13px; color: var(--ink-3);\n  text-align: center;\n}\n.diagram svg { width: 100%; height: auto; display: block; }\n\n/* ============ Hero ============ */\n\n.hero {\n  padding: 60px 0 24px;\n  border-bottom: 1px dashed var(--line);\n  margin-bottom: 56px;\n}\n.hero .meta {\n  display: flex; gap: 22px; flex-wrap: wrap;\n  margin-top: 28px;\n  font-family: 'IBM Plex Sans'; font-size: 13px; color: var(--ink-3);\n}\n.hero .meta span strong { color: var(--ink); }\n\n.toc {\n  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;\n  margin: 28px 0 0;\n  font-family: 'IBM Plex Sans'; font-size: 14px;\n}\n.toc a {\n  display: flex; align-items: center; gap: 10px;\n  padding: 12px 14px; border-radius: 10px;\n  background: var(--bg-card); border: 1px solid var(--line);\n  color: var(--ink); font-weight: 500;\n  transition: transform .15s ease, border-color .15s ease;\n}\n.toc a:hover { transform: translateY(-1px); border-color: var(--line-2); text-decoration: none; }\n.toc a .num { color: var(--ink-3); min-width: 22px; font-variant-numeric: tabular-nums; font-size: 13px; }\n\n/* ============ Interactive widgets ============ */\n\n.interactive {\n  background: var(--bg-card);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 22px;\n  margin: 22px 0;\n  box-shadow: var(--shadow);\n}\n.interactive .head {\n  display: flex; justify-content: space-between; align-items: baseline;\n  margin-bottom: 14px;\n  border-bottom: 1px solid var(--line); padding-bottom: 10px;\n}\n.interactive .head .ttl { font-family: 'IBM Plex Sans'; font-weight: 600; }\n.interactive .head .tag {\n  font-family: 'IBM Plex Sans'; font-size: 11px; font-weight: 600;\n  letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--accent);\n  background: var(--accent-soft);\n  padding: 4px 8px; border-radius: 4px;\n}\n\nbutton.btn, .btn {\n  font-family: 'IBM Plex Sans'; font-weight: 500; font-size: 14px;\n  padding: 8px 14px; border-radius: 8px;\n  border: 1px solid var(--line-2);\n  background: var(--bg-card); color: var(--ink);\n  cursor: pointer;\n  transition: all .12s ease;\n}\nbutton.btn:hover { background: var(--bg-2); }\nbutton.btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }\nbutton.btn.primary:hover { background: oklch(30% 0 0); }\nbutton.btn.warn { background: var(--warm); color: white; border-color: var(--warm); }\n\ninput[type=\"text\"], input[type=\"number\"] {\n  font-family: 'JetBrains Mono'; font-size: 14px;\n  padding: 8px 10px; border-radius: 8px;\n  border: 1px solid var(--line-2); background: var(--bg-card);\n  color: var(--ink);\n}\ninput:focus { outline: 2px solid var(--accent); outline-offset: 1px; }\n\n.controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }\n.row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }\n\n/* 5 V's selector */\n.vs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 14px 0; }\n.vs button {\n  font-family: 'IBM Plex Sans'; padding: 14px 6px; border-radius: 10px;\n  border: 1px solid var(--line); background: var(--bg-card); cursor: pointer;\n  transition: all .15s ease;\n}\n.vs button .v {\n  display: block; font-size: 30px; font-weight: 600; line-height: 1; color: var(--ink);\n}\n.vs button .l {\n  display: block; font-size: 11px; letter-spacing: 0.1em;\n  color: var(--ink-3); text-transform: uppercase; margin-top: 6px;\n}\n.vs button.active { background: var(--ink); border-color: var(--ink); }\n.vs button.active .v, .vs button.active .l { color: var(--bg); }\n\n.v-detail {\n  background: var(--bg-2); border-radius: 10px; padding: 14px 16px;\n  font-size: 15px; line-height: 1.6; color: var(--ink-2);\n  border: 1px solid var(--line);\n  min-height: 70px;\n}\n.v-detail strong { color: var(--ink); }\n\n/* CAP triangle */\n.cap-wrap { display: grid; grid-template-columns: 360px 1fr; gap: 28px; align-items: center; }\n@media (max-width: 720px) { .cap-wrap { grid-template-columns: 1fr; } }\n.cap-vertex { cursor: pointer; transition: opacity .15s ease; }\n.cap-vertex:hover { opacity: 0.7; }\n.cap-info { font-size: 14px; color: var(--ink-2); }\n.cap-info h4 { margin-top: 0; }\n.cap-info .pair {\n  display: inline-block; padding: 3px 8px; border-radius: 4px;\n  font-family: 'JetBrains Mono'; font-size: 12px;\n  background: var(--accent-soft); color: var(--accent);\n  margin-right: 6px;\n}\n\n/* Bloom Filter */\n.bloom-bits {\n  display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px;\n  margin: 14px 0; font-family: 'JetBrains Mono'; font-size: 11px;\n}\n.bloom-bits .bit {\n  aspect-ratio: 1; display: grid; place-items: center;\n  background: var(--bg-2); border-radius: 3px; color: var(--ink-3);\n  transition: all .2s ease;\n}\n.bloom-bits .bit.on { background: var(--accent); color: white; }\n.bloom-bits .bit.hit { box-shadow: 0 0 0 2px var(--warm); }\n\n.bloom-log {\n  background: #1E1A16; color: #F2EDE4; border-radius: 8px;\n  padding: 10px 14px; font-family: 'JetBrains Mono'; font-size: 12px;\n  max-height: 140px; overflow-y: auto;\n  min-height: 60px;\n}\n.bloom-log .ok { color: oklch(75% 0.13 150); }\n.bloom-log .no { color: oklch(70% 0.16 25); }\n.bloom-log .fp { color: oklch(75% 0.13 60); }\n\n/* Hash ring */\n.ring-wrap { display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: center; }\n@media (max-width: 720px) { .ring-wrap { grid-template-columns: 1fr; } }\n.ring-info ul { padding-left: 18px; }\n\n/* MapReduce flow stepper */\n.mr-flow {\n  display: grid; grid-template-columns: 60px 1fr; gap: 18px;\n  margin: 18px 0;\n}\n.mr-steps { display: flex; flex-direction: column; gap: 6px; }\n.mr-steps button {\n  font-family: 'IBM Plex Sans'; font-size: 13px; font-weight: 600;\n  padding: 10px 6px; border-radius: 8px; cursor: pointer;\n  border: 1px solid var(--line); background: var(--bg-card);\n  color: var(--ink-3);\n  writing-mode: vertical-rl; transform: rotate(180deg);\n  min-height: 60px;\n}\n.mr-steps button.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }\n\n/* Exam analysis chart */\n.freq-chart { display: flex; flex-direction: column; gap: 8px; margin: 18px 0; font-family: 'IBM Plex Sans'; }\n.freq-row { display: grid; grid-template-columns: 220px 1fr 40px; gap: 14px; align-items: center; font-size: 14px; }\n.freq-row .topic { color: var(--ink); font-weight: 500; }\n.freq-row .bar { height: 22px; background: var(--bg-2); border-radius: 4px; overflow: hidden; position: relative; }\n.freq-row .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), oklch(60% 0.13 220)); border-radius: 4px; }\n.freq-row .freq { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); text-align: right; }\n.freq-row .years { font-size: 11px; color: var(--ink-3); margin-top: 2px; }\n\n/* Exam question card */\n.exam-q {\n  background: var(--bg-card);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 22px 24px;\n  margin: 20px 0;\n  box-shadow: var(--shadow);\n}\n.exam-q .meta {\n  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;\n  margin-bottom: 10px;\n  font-family: 'IBM Plex Sans'; font-size: 12px;\n}\n.exam-q .meta .tag {\n  padding: 3px 8px; border-radius: 4px;\n  background: var(--bg-2); color: var(--ink-2); font-weight: 500;\n  font-size: 11px; letter-spacing: 0.04em;\n}\n.exam-q .meta .tag.year { background: var(--ink); color: var(--bg); }\n.exam-q .meta .tag.topic { background: var(--accent-soft); color: var(--accent); }\n.exam-q .meta .tag.marks { background: var(--warm-soft); color: oklch(45% 0.12 60); }\n.exam-q .q { font-family: 'IBM Plex Sans'; font-weight: 500; color: var(--ink); margin-bottom: 8px; font-size: 15px; line-height: 1.55; }\n.exam-q .q em { font-style: italic; color: var(--ink-2); }\n.exam-q .ans summary {\n  cursor: pointer; font-family: 'IBM Plex Sans'; font-size: 13px;\n  color: var(--accent); font-weight: 600;\n  margin-top: 12px;\n  user-select: none;\n}\n.exam-q .ans[open] summary { margin-bottom: 8px; }\n.exam-q .ans .body {\n  background: var(--bg-2); border-radius: 8px; padding: 14px 16px;\n  font-size: 14.5px; line-height: 1.65; color: var(--ink-2);\n}\n.exam-q .ans .body ul, .exam-q .ans .body ol { margin: 6px 0 6px; }\n\n/* Formula box */\n.formula {\n  background: var(--ink); color: var(--bg);\n  border-radius: 10px; padding: 14px 18px;\n  font-family: 'JetBrains Mono'; font-size: 16px;\n  margin: 12px 0;\n  display: flex; justify-content: center; align-items: center;\n  letter-spacing: 0.02em;\n}\n\n/* Checklist */\n.check-list { list-style: none; padding: 0; }\n.check-list li {\n  display: grid; grid-template-columns: 28px 1fr; gap: 10px;\n  padding: 8px 0; border-bottom: 1px dashed var(--line);\n  font-family: 'IBM Plex Sans'; font-size: 14.5px;\n}\n.check-list li::before {\n  content: \"\"; width: 18px; height: 18px; border-radius: 4px;\n  border: 1.5px solid var(--line-2);\n  background: var(--bg-card);\n  margin-top: 4px;\n}\n\n/* Grid layouts */\n.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }\n@media (max-width: 720px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }\n\n.stat {\n  background: var(--bg-card); border: 1px solid var(--line);\n  border-radius: var(--radius-sm); padding: 14px 16px;\n}\n.stat .n { font-family: 'IBM Plex Sans'; font-size: 28px; font-weight: 600; color: var(--ink); line-height: 1; }\n.stat .l { font-family: 'IBM Plex Sans'; font-size: 12px; color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 6px; }\n\n/* Comparison side-by-side */\n.versus { display: grid; grid-template-columns: 1fr 50px 1fr; gap: 0; margin: 18px 0; align-items: stretch; }\n.versus .side {\n  background: var(--bg-card); border: 1px solid var(--line);\n  border-radius: var(--radius); padding: 18px;\n  font-size: 14.5px;\n}\n.versus .vs-mid {\n  display: grid; place-items: center;\n  font-family: 'IBM Plex Sans'; font-weight: 700; color: var(--ink-3);\n  font-size: 13px; letter-spacing: 0.1em;\n}\n.versus .side h4 { margin: 0 0 10px; font-size: 16px; }\n.versus .side ul { padding-left: 18px; }\n@media (max-width: 720px) {\n  .versus { grid-template-columns: 1fr; }\n  .versus .vs-mid { padding: 6px 0; }\n}\n\n/* Tags */\n.tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }\n.tag-pill {\n  font-family: 'IBM Plex Sans'; font-size: 11px; font-weight: 500;\n  padding: 4px 10px; border-radius: 100px;\n  background: var(--bg-2); color: var(--ink-2);\n  border: 1px solid var(--line);\n}\n\n/* Image placeholder (subtle stripes) */\n.imgph {\n  background: repeating-linear-gradient(45deg, var(--bg-2), var(--bg-2) 10px, var(--bg-card) 10px, var(--bg-card) 20px);\n  border: 1px dashed var(--line-2); border-radius: 8px;\n  padding: 24px; text-align: center; color: var(--ink-3);\n  font-family: 'JetBrains Mono'; font-size: 12px;\n}\n\n/* Quote */\nblockquote {\n  border-left: 3px solid var(--accent);\n  background: var(--accent-soft);\n  padding: 14px 18px;\n  border-radius: 0 8px 8px 0;\n  margin: 16px 0;\n  font-style: italic;\n  color: var(--ink-2);\n  font-size: 16px;\n}\n\n/* Step list (numbered with circle) */\n.steps { list-style: none; padding: 0; counter-reset: step; }\n.steps li {\n  position: relative; padding: 6px 0 14px 44px; counter-increment: step;\n  border-left: 1.5px dashed var(--line); margin-left: 14px;\n}\n.steps li::before {\n  content: counter(step);\n  position: absolute; left: -14px; top: 0;\n  width: 28px; height: 28px; border-radius: 50%;\n  background: var(--ink); color: var(--bg);\n  display: grid; place-items: center;\n  font-family: 'IBM Plex Sans'; font-weight: 600; font-size: 12px;\n}\n.steps li:last-child { border-left-color: transparent; }\n.steps li strong { color: var(--ink); }\n\n/* Selectable */\n::selection { background: oklch(85% 0.10 250); color: var(--ink); }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"app\">\n\n<!-- =========================== SIDEBAR =========================== -->\n<aside class=\"sidebar\">\n  <div class=\"brand\">\n    <div class=\"mark\">BD<\u002Fdiv>\n    <div class=\"name\">Big Data<small>A friendly exam tutorial<\u002Fsmall><\u002Fdiv>\n  <\u002Fdiv>\n  <nav>\n    <div class=\"group\">Start here<\u002Fdiv>\n    <a href=\"#hero\"><span class=\"num\">00<\u002Fspan>Introduction<\u002Fa>\n    <a href=\"#exam-analysis\"><span class=\"num\">01<\u002Fspan>Past-paper analysis<\u002Fa>\n\n    <div class=\"group\">Foundations<\u002Fdiv>\n    <a href=\"#fundamentals\"><span class=\"num\">02<\u002Fspan>Big Data fundamentals<\u002Fa>\n    <a href=\"#mapreduce\"><span class=\"num\">03<\u002Fspan>MapReduce &amp; Hadoop<\u002Fa>\n    <a href=\"#spark\"><span class=\"num\">04<\u002Fspan>Apache Spark<\u002Fa>\n\n    <div class=\"group\">Storage<\u002Fdiv>\n    <a href=\"#hdfs\"><span class=\"num\">05<\u002Fspan>HDFS<\u002Fa>\n    <a href=\"#cap\"><span class=\"num\">06<\u002Fspan>CAP theorem &amp; BASE<\u002Fa>\n    <a href=\"#lsm\"><span class=\"num\">07<\u002Fspan>LSM trees &amp; Bloom filters<\u002Fa>\n\n    <div class=\"group\">Databases<\u002Fdiv>\n    <a href=\"#hbase\"><span class=\"num\">08<\u002Fspan>BigTable &amp; HBase<\u002Fa>\n    <a href=\"#zk\"><span class=\"num\">09<\u002Fspan>ZooKeeper &amp; DHT<\u002Fa>\n    <a href=\"#cassandra\"><span class=\"num\">10<\u002Fspan>Cassandra<\u002Fa>\n\n    <div class=\"group\">Ops &amp; ethics<\u002Fdiv>\n    <a href=\"#cluster\"><span class=\"num\">11<\u002Fspan>Cluster &amp; ethics<\u002Fa>\n\n    <div class=\"group\">Revision<\u002Fdiv>\n    <a href=\"#question-bank\"><span class=\"num\">12<\u002Fspan>Real exam questions<\u002Fa>\n    <a href=\"#formulas\"><span class=\"num\">13<\u002Fspan>Formula sheet<\u002Fa>\n    <a href=\"#checklist\"><span class=\"num\">14<\u002Fspan>Night-before checklist<\u002Fa>\n  <\u002Fnav>\n<\u002Faside>\n\n<!-- =========================== MAIN =========================== -->\n<main>\n\n<!-- ========== HERO ========== -->\n<section class=\"chapter\" id=\"hero\">\n  <div class=\"hero\">\n    <span class=\"eyebrow\">COMPSCI 4064 / 5088 · Glasgow<\u002Fspan>\n    <h1 class=\"title\">A friendly tutorial for the<br>Big Data exam.<\u002Fh1>\n    <p class=\"lede\">\n      Every topic from your notes, explained in simple words with diagrams, simple analogies, and little\n      interactive demos. At the end there is a bank of <strong>real questions<\u002Fstrong> from past papers, each\n      tagged with the topic it tests so you can revise by weakness.\n    <\u002Fp>\n    <div class=\"row\">\n      <a class=\"btn primary\" href=\"#fundamentals\">Start the tutorial →<\u002Fa>\n      <a class=\"btn\" href=\"#question-bank\">Jump to exam questions<\u002Fa>\n      <a class=\"btn\" href=\"#exam-analysis\">See past-paper analysis<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"meta\">\n      <span><strong>10<\u002Fstrong> topic chapters<\u002Fspan>\n      <span><strong>30+<\u002Fstrong> real exam questions<\u002Fspan>\n      <span><strong>5<\u002Fstrong> interactive demos<\u002Fspan>\n      <span><strong>~90 min<\u002Fstrong> read<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 style=\"margin-top:0\">How to use this tutorial<\u002Fh3>\n  <div class=\"grid-3\">\n    <div class=\"card\">\n      <h4 style=\"margin-top:0\">1 · Read each chapter<\u002Fh4>\n      <p>Every chapter starts with a one-line definition, an everyday <strong>analogy<\u002Fstrong>, then a diagram,\n      then the technical details. If you only have time for the bold lines, that is fine.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <h4 style=\"margin-top:0\">2 · Play with the demos<\u002Fh4>\n      <p>Bloom filters, CAP triangle, hash rings, MapReduce flow — touch the buttons. Doing beats reading.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <h4 style=\"margin-top:0\">3 · Drill the question bank<\u002Fh4>\n      <p>Every real question from 2015–2025 is tagged with a topic. Try, then expand the model answer.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== EXAM ANALYSIS ========== -->\n<section class=\"chapter\" id=\"exam-analysis\">\n  <span class=\"eyebrow\">Chapter 01<\u002Fspan>\n  <h2 class=\"chapter-title\">What the exam actually tests<\u002Fh2>\n  <p class=\"lede\">Looking at the 2015–2025 papers, the same handful of topics come back again and again. Here is the\n  frequency, biggest first. Spend most of your revision time on the top half of this chart.<\u002Fp>\n\n  <div class=\"card\">\n    <h4 style=\"margin-top:0\">Topic frequency, 2015–2025<\u002Fh4>\n    <div class=\"freq-chart\">\n      <div class=\"freq-row\"><div class=\"topic\">HDFS read / write protocol<div class=\"years\">2015, 2017, 2018, 2019, 2020, 2023<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:100%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">6×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">\"Is this a Big Data problem?\" (5 Vs)<div class=\"years\">2018, 2019, 2020, 2023, 2023P, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:100%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">6×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">MapReduce job design<div class=\"years\">2015, 2016, 2017, 2018, 2020<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:84%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">5×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">Spark vs Hadoop<div class=\"years\">2018, 2019, 2020, 2023, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:84%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">5×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">NFS vs HDFS comparison<div class=\"years\">2015, 2017, 2019, 2023<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:68%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">4×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">CAP / BASE classification<div class=\"years\">2017, 2018, 2019, 2023<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:68%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">4×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">HBase data model / lookup<div class=\"years\">2016, 2017, 2019, 2023, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:84%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">5×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">LSM trees / Bloom filters<div class=\"years\">2018, 2019, 2020, 2023, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:84%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">5×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">Cassandra (vs HBase) / quorum<div class=\"years\">2019, 2020, 2023, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:68%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">4×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">Hadoop overheads / weaknesses<div class=\"years\">2019, 2020, 2023, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:68%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">4×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">DHT / consistent hashing<div class=\"years\">2019, 2023, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:50%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">3×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">Cluster mgmt (Kubernetes, YARN)<div class=\"years\">2023, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:34%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">2×<\u002Fdiv><\u002Fdiv>\n      <div class=\"freq-row\"><div class=\"topic\">GDPR / ethics<div class=\"years\">2023, 2025<\u002Fdiv><\u002Fdiv><div class=\"bar\"><div class=\"bar-fill\" style=\"width:34%\"><\u002Fdiv><\u002Fdiv><div class=\"freq\">2×<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>The \"shape\" of every Big Data exam<\u002Fh3>\n  <p>The paper is <strong>1.5 hours, 60 marks, 3 (sometimes 4) compulsory questions<\u002Fstrong>. Each question follows the same\n  hidden recipe:<\u002Fp>\n  <ol class=\"steps\">\n    <li><strong>Q1 — A scenario.<\u002Fstrong> A made-up company (satellites, banks, shipping, crypto). You must say <em>\"yes this is Big Data,\n    because Volume… Velocity… Variability\"<\u002Fem> AND explain why a single big mainframe will not work.<\u002Fli>\n    <li><strong>Q2 — Hadoop / Spark / MapReduce.<\u002Fstrong> Either \"design a MapReduce job for this\" or \"what would the overheads be\"\n    or \"why would Spark be better\". You always finish by comparing the two.<\u002Fli>\n    <li><strong>Q3 — Storage.<\u002Fstrong> Either NFS vs HDFS, or HBase / Cassandra / LSM / Bloom filters / consistent hashing. CAP\n    almost always sneaks in.<\u002Fli>\n    <li><strong>Q4 (M-level / occasional) — Streaming, training, or ethics / GDPR / Kubernetes.<\u002Fstrong><\u002Fli>\n  <\u002Fol>\n\n  <div class=\"callout exam\">\n    <div class=\"icn\">★<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Exam strategy<\u002Fdiv>\n      <p>The marks are usually <strong>\"1 mark for naming, 1 mark for explaining why\"<\u002Fstrong>. So always answer in pairs:\n      <em>\"It is X. This matters here because Y.\"<\u002Fem> A bullet that only names something gets half marks at best.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 02 · FUNDAMENTALS ========== -->\n<section class=\"chapter\" id=\"fundamentals\">\n  <span class=\"eyebrow\">Chapter 02<\u002Fspan>\n  <h2 class=\"chapter-title\">Big Data fundamentals<\u002Fh2>\n  <p class=\"lede\">What \"Big Data\" actually means, the famous 5 Vs, why you cannot just buy a bigger computer, and the\n  difference between batch and stream processing.<\u002Fp>\n\n  <h3>What is Big Data?<\u002Fh3>\n  <blockquote>\"Data whose capturing, storage, curation, management, and processing are not possible with traditional tools within a tolerable amount of time.\"<\u002Fblockquote>\n  <p>In simple words: <strong>data that is too big, too fast, or too messy for one normal computer to handle in a sensible time<\u002Fstrong>.\n  Notice the word <em>traditional tools<\u002Fem> — Big Data is <strong>relative<\u002Fstrong>. 100 MB was \"big\" in the 1990s. Today, 1 petabyte\n  might be big. As hardware improves, the goalpost moves.<\u002Fp>\n\n  <div class=\"analogy\">\n    <div class=\"label\">🍕 Pizza analogy<\u002Fdiv>\n    <p>Imagine you ordered <strong>10,000 pizzas<\u002Fstrong> for a stadium. One waiter cannot carry them. One oven cannot bake them.\n    One delivery van cannot fit them. You need a <em>system<\u002Fem> — many ovens, many vans, many waiters all working at the same time,\n    and a manager who tells everyone what to do. That is exactly the Big Data story.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3>The 5 Vs — click any letter<\u002Fh3>\n  <p>This is the most asked question in the whole exam. When a question asks <em>\"Is this a Big Data problem?\"<\u002Fem>, your answer\n  is always: <strong>\"Pick at least two of these Vs and explain how they apply to the scenario.\"<\u002Fstrong><\u002Fp>\n\n  <div class=\"interactive\" id=\"vs-widget\">\n    <div class=\"head\"><div class=\"ttl\">The 5 Vs of Big Data<\u002Fdiv><div class=\"tag\">interactive<\u002Fdiv><\u002Fdiv>\n    <div class=\"vs\">\n      <button data-v=\"Volume\"><span class=\"v\">V<\u002Fspan><span class=\"l\">Volume<\u002Fspan><\u002Fbutton>\n      <button data-v=\"Variety\"><span class=\"v\">V<\u002Fspan><span class=\"l\">Variety<\u002Fspan><\u002Fbutton>\n      <button data-v=\"Velocity\"><span class=\"v\">V<\u002Fspan><span class=\"l\">Velocity<\u002Fspan><\u002Fbutton>\n      <button data-v=\"Veracity\"><span class=\"v\">V<\u002Fspan><span class=\"l\">Veracity<\u002Fspan><\u002Fbutton>\n      <button data-v=\"Variability\"><span class=\"v\">V<\u002Fspan><span class=\"l\">Variability<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"v-detail\">Loading…<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout exam\">\n    <div class=\"icn\">★<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Exam tip<\u002Fdiv>\n      <p>Volume is the most obvious one — but the examiner gives easy marks for spotting the <em>less obvious<\u002Fem> Vs.\n      <strong>Veracity<\u002Fstrong> (noisy / unreliable data) and <strong>Variability<\u002Fstrong> (busy seasons, traffic spikes)\n      are easy to miss. Always state the dimension, then <em>why it applies to this specific scenario<\u002Fem>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Three things people do with Big Data<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th style=\"width:30%\">Use case<\u002Fth><th style=\"width:40%\">What it does<\u002Fth><th>Real example<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Extraction / Filtering<\u002Fstrong><\u002Ftd><td>Pick a subset that matches a rule.<\u002Ftd><td><code class=\"inline\">SELECT … WHERE<\u002Fcode>, find all tweets about football.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Transformation<\u002Fstrong><\u002Ftd><td>Apply a function to every item.<\u002Ftd><td>Translate every article, run sentiment analysis on every review.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Aggregation<\u002Fstrong><\u002Ftd><td>Merge many items into one summary.<\u002Ftd><td>Word count, <code class=\"inline\">JOIN<\u002Fcode>, k-means clustering.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <p>Why these three matter: <strong>they map exactly onto Map and Reduce.<\u002Fstrong> Extraction and transformation = Map. Aggregation = Reduce. This is why MapReduce was such a clean idea.<\u002Fp>\n\n  <h3>Hardware primer — why storage tiers matter<\u002Fh3>\n  <p>Big Data is really a fight against <strong>latency<\u002Fstrong>. Reading from RAM is millions of times faster than reading from disk.\n  This is the whole reason Spark exists (it keeps data in RAM between steps; Hadoop writes to disk between steps).<\u002Fp>\n\n  <div class=\"diagram\">\n    <svg viewBox=\"0 0 800 280\" role=\"img\" aria-label=\"Storage tier pyramid\">\n      <defs>\n        <linearGradient id=\"tierGrad\" x1=\"0\" x2=\"1\"><stop offset=\"0\" stop-color=\"oklch(50% 0.13 250)\"><\u002Fstop><stop offset=\"1\" stop-color=\"oklch(65% 0.13 60)\"><\u002Fstop><\u002FlinearGradient>\n      <\u002Fdefs>\n      <g font-family=\"IBM Plex Sans\" font-size=\"13\">\n        <!-- pyramid steps -->\n        <rect x=\"320\" y=\"20\" width=\"160\" height=\"34\" fill=\"oklch(50% 0.13 250)\"><\u002Frect><text x=\"400\" y=\"42\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">CPU registers<\u002Ftext>\n        <rect x=\"290\" y=\"60\" width=\"220\" height=\"34\" fill=\"oklch(53% 0.13 240)\"><\u002Frect><text x=\"400\" y=\"82\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">L1 / L2 / L3 cache<\u002Ftext>\n        <rect x=\"250\" y=\"100\" width=\"300\" height=\"34\" fill=\"oklch(56% 0.13 220)\"><\u002Frect><text x=\"400\" y=\"122\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Main memory (RAM)<\u002Ftext>\n        <rect x=\"200\" y=\"140\" width=\"400\" height=\"34\" fill=\"oklch(60% 0.13 180)\"><\u002Frect><text x=\"400\" y=\"162\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">SSD<\u002Ftext>\n        <rect x=\"150\" y=\"180\" width=\"500\" height=\"34\" fill=\"oklch(62% 0.13 120)\"><\u002Frect><text x=\"400\" y=\"202\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">HDD (spinning disk)<\u002Ftext>\n        <rect x=\"100\" y=\"220\" width=\"600\" height=\"34\" fill=\"oklch(65% 0.13 60)\"><\u002Frect><text x=\"400\" y=\"242\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Network / remote<\u002Ftext>\n\n        <!-- labels left and right -->\n        <text x=\"80\" y=\"42\" text-anchor=\"end\" fill=\"#7A6F65\">fastest<\u002Ftext>\n        <text x=\"80\" y=\"242\" text-anchor=\"end\" fill=\"#7A6F65\">slowest<\u002Ftext>\n        <text x=\"720\" y=\"42\" fill=\"#7A6F65\">smallest<\u002Ftext>\n        <text x=\"720\" y=\"242\" fill=\"#7A6F65\">largest<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cap\">Storage hierarchy — upper tiers are fast/small/expensive, lower tiers are slow/big/cheap.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <table class=\"tbl\">\n    <thead><tr><th>Operation<\u002Fth><th>Real latency<\u002Fth><th>If 1 CPU cycle = 1 second…<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td>L1 cache hit<\u002Ftd><td>~1 ns<\u002Ftd><td>~1 second<\u002Ftd><\u002Ftr>\n      <tr><td>RAM read<\u002Ftd><td>~100 ns<\u002Ftd><td>~2 minutes<\u002Ftd><\u002Ftr>\n      <tr><td>SSD read<\u002Ftd><td>~100 µs<\u002Ftd><td>~1 day<\u002Ftd><\u002Ftr>\n      <tr><td>HDD seek<\u002Ftd><td>~10 ms<\u002Ftd><td>~4 months<\u002Ftd><\u002Ftr>\n      <tr><td>LAN round-trip<\u002Ftd><td>~1 ms<\u002Ftd><td>~1 year<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <p>Remember this: <strong>\"the network is always the bottleneck\"<\u002Fstrong>. Any time data has to leave one machine and travel\n  to another, you have lost a lot of time. This is why Hadoop tries to <em>move compute to the data<\u002Fem>, not data to the compute.<\u002Fp>\n\n  <h3>Vertical vs horizontal scaling<\u002Fh3>\n  <div class=\"versus\">\n    <div class=\"side\">\n      <h4>⬆️ Vertical (scale up)<\u002Fh4>\n      <p>Buy a bigger, faster computer. A mainframe.<\u002Fp>\n      <ul>\n        <li>Simple — same programs work, just faster.<\u002Fli>\n        <li>Very <strong>expensive<\u002Fstrong> per unit of power.<\u002Fli>\n        <li><strong>Physical limits<\u002Fstrong>: transistors can only get so small, chips can only get so big.<\u002Fli>\n        <li>Single point of failure.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"vs-mid\">VS<\u002Fdiv>\n    <div class=\"side\">\n      <h4>↔️ Horizontal (scale out)<\u002Fh4>\n      <p>Buy many cheap computers and connect them.<\u002Fp>\n      <ul>\n        <li>Cheap commodity hardware, almost <strong>unlimited<\u002Fstrong> growth.<\u002Fli>\n        <li>Hard to program — needs special frameworks (Hadoop, Spark).<\u002Fli>\n        <li>Must handle failure: machines <em>will<\u002Fem> die.<\u002Fli>\n        <li><strong>This is what the whole course is about.<\u002Fstrong><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Batch vs Stream processing<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th><\u002Fth><th>Batch<\u002Fth><th>Stream<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Data<\u002Fstrong><\u002Ftd><td>Sits still, complete<\u002Ftd><td>Arrives continuously<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Processing<\u002Fstrong><\u002Ftd><td>Big chunks at once<\u002Ftd><td>Item by item (or tiny micro-batches)<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Metric<\u002Fstrong><\u002Ftd><td>Total completion time<\u002Ftd><td>Latency per item<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Example<\u002Fstrong><\u002Ftd><td>Train an ML model, build a search index<\u002Ftd><td>Detect fraud, live truck tracking<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Parallelism &amp; speed-up<\u002Fh3>\n  <p>If a job takes 100 seconds on 1 machine, and 25 seconds on 4 machines, the speed-up is 4×. The ideal is <em>linear<\u002Fem>\n  (speed-up = number of machines) but you almost never hit that — communication and synchronisation eat some of the gain.<\u002Fp>\n  <div class=\"formula\">Speed-up(n, p) = Serial_Time(n) ÷ Parallel_Time(n, p)<\u002Fdiv>\n  <p>Where <code class=\"inline\">n<\u002Fcode> is the input size and <code class=\"inline\">p<\u002Fcode> is the number of processors. Best case\n  <code class=\"inline\">speed-up = p<\u002Fcode>; you should expect <code class=\"inline\">0 &lt; speed-up ≤ p<\u002Fcode>.<\u002Fp>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 03 · MAPREDUCE ========== -->\n<section class=\"chapter\" id=\"mapreduce\">\n  <span class=\"eyebrow\">Chapter 03<\u002Fspan>\n  <h2 class=\"chapter-title\">MapReduce &amp; Hadoop<\u002Fh2>\n  <p class=\"lede\">MapReduce is a simple recipe for doing one big job on many machines. Hadoop is the open-source toolkit\n  that runs it.<\u002Fp>\n\n  <div class=\"analogy\">\n    <div class=\"label\">🍳 Restaurant analogy<\u002Fdiv>\n    <p><strong>Map<\u002Fstrong> = many line cooks each chopping vegetables on their own station. <strong>Shuffle<\u002Fstrong> = runners carry\n    chopped onions to one bowl, tomatoes to another. <strong>Reduce<\u002Fstrong> = one cook per bowl turns the pile into a finished sauce.\n    Nobody talks to anybody during their own chopping, and that is what makes the whole kitchen scale.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3>The MapReduce paradigm<\u002Fh3>\n  <p>Just two functions you write:<\u002Fp>\n<pre class=\"code\"><span class=\"kw\">Map<\u002Fspan>(Key1, Value1)        <span class=\"com\">→ list of (Key2, Value2)<\u002Fspan>\n<span class=\"kw\">Reduce<\u002Fspan>(Key2, list&lt;Value2&gt;) <span class=\"com\">→ list of Value2<\u002Fspan><\u002Fpre>\n  <p>Everything else (splitting the input, sorting, sending data over the network, retrying failed tasks) is the framework's job.<\u002Fp>\n\n  <h3>The full pipeline — click a step<\u002Fh3>\n\n  <div class=\"interactive\" id=\"mr-widget\">\n    <div class=\"head\"><div class=\"ttl\">MapReduce flow — word count<\u002Fdiv><div class=\"tag\">interactive<\u002Fdiv><\u002Fdiv>\n    <div class=\"mr-flow\">\n      <div class=\"mr-steps\">\n        <button data-i=\"0\" class=\"active\">Input<\u002Fbutton>\n        <button data-i=\"1\">Map<\u002Fbutton>\n        <button data-i=\"2\">Sort<\u002Fbutton>\n        <button data-i=\"3\">Shuffle<\u002Fbutton>\n        <button data-i=\"4\">Reduce<\u002Fbutton>\n        <button data-i=\"5\">Output<\u002Fbutton>\n      <\u002Fdiv>\n      <div>\n        <div class=\"mr-desc\" style=\"background: var(--bg-2); padding: 12px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 14.5px;\"><\u002Fdiv>\n        <svg class=\"mr-viz\" viewBox=\"0 0 480 140\" style=\"background: white; border-radius: 8px; border: 1px solid var(--line);\"><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Hadoop architecture (v1)<\u002Fh3>\n  <p>Hadoop is Yahoo's open-source version of Google's MapReduce paper. Five key roles:<\u002Fp>\n\n  <div class=\"diagram\">\n    <svg viewBox=\"0 0 800 360\" role=\"img\" aria-label=\"Hadoop v1 architecture\">\n      <defs><marker id=\"arr\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#7A6F65\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n      <g font-family=\"IBM Plex Sans\" font-size=\"13\">\n        <!-- Client -->\n        <rect x=\"340\" y=\"10\" width=\"120\" height=\"44\" rx=\"8\" fill=\"oklch(50% 0.13 250)\"><\u002Frect>\n        <text x=\"400\" y=\"38\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Client<\u002Ftext>\n\n        <!-- Job Tracker -->\n        <rect x=\"200\" y=\"100\" width=\"180\" height=\"56\" rx=\"8\" fill=\"#1E1A16\"><\u002Frect>\n        <text x=\"290\" y=\"124\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Job Tracker<\u002Ftext>\n        <text x=\"290\" y=\"142\" text-anchor=\"middle\" fill=\"#D6CCBC\" font-size=\"11\">orchestrates the job<\u002Ftext>\n\n        <!-- Name Node -->\n        <rect x=\"430\" y=\"100\" width=\"180\" height=\"56\" rx=\"8\" fill=\"oklch(65% 0.13 60)\"><\u002Frect>\n        <text x=\"520\" y=\"124\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Name Node<\u002Ftext>\n        <text x=\"520\" y=\"142\" text-anchor=\"middle\" fill=\"white\" font-size=\"11\">knows where data lives<\u002Ftext>\n\n        <!-- 3 Task Trackers -->\n        <g>\n          <rect x=\"60\" y=\"210\" width=\"180\" height=\"56\" rx=\"8\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect>\n          <text x=\"150\" y=\"234\" text-anchor=\"middle\" font-weight=\"600\">TaskTracker A<\u002Ftext>\n          <text x=\"150\" y=\"252\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">slot 1 · slot 2<\u002Ftext>\n\n          <rect x=\"290\" y=\"210\" width=\"180\" height=\"56\" rx=\"8\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect>\n          <text x=\"380\" y=\"234\" text-anchor=\"middle\" font-weight=\"600\">TaskTracker B<\u002Ftext>\n          <text x=\"380\" y=\"252\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">slot 1 · slot 2<\u002Ftext>\n\n          <rect x=\"520\" y=\"210\" width=\"180\" height=\"56\" rx=\"8\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect>\n          <text x=\"610\" y=\"234\" text-anchor=\"middle\" font-weight=\"600\">TaskTracker C<\u002Ftext>\n          <text x=\"610\" y=\"252\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">slot 1 · slot 2<\u002Ftext>\n        <\u002Fg>\n\n        <!-- 3 Data Nodes underneath -->\n        <g>\n          <rect x=\"60\" y=\"300\" width=\"180\" height=\"40\" rx=\"6\" fill=\"oklch(95% 0.03 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n          <text x=\"150\" y=\"324\" text-anchor=\"middle\" font-weight=\"600\" fill=\"oklch(40% 0.13 250)\">DataNode A<\u002Ftext>\n          <rect x=\"290\" y=\"300\" width=\"180\" height=\"40\" rx=\"6\" fill=\"oklch(95% 0.03 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n          <text x=\"380\" y=\"324\" text-anchor=\"middle\" font-weight=\"600\" fill=\"oklch(40% 0.13 250)\">DataNode B<\u002Ftext>\n          <rect x=\"520\" y=\"300\" width=\"180\" height=\"40\" rx=\"6\" fill=\"oklch(95% 0.03 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n          <text x=\"610\" y=\"324\" text-anchor=\"middle\" font-weight=\"600\" fill=\"oklch(40% 0.13 250)\">DataNode C<\u002Ftext>\n        <\u002Fg>\n\n        <!-- Arrows -->\n        <line x1=\"400\" y1=\"54\" x2=\"290\" y2=\"100\" stroke=\"#7A6F65\" marker-end=\"url(#arr)\"><\u002Fline>\n        <line x1=\"380\" y1=\"128\" x2=\"430\" y2=\"128\" stroke=\"#7A6F65\" marker-end=\"url(#arr)\"><\u002Fline>\n        <line x1=\"290\" y1=\"156\" x2=\"150\" y2=\"210\" stroke=\"#7A6F65\" marker-end=\"url(#arr)\"><\u002Fline>\n        <line x1=\"290\" y1=\"156\" x2=\"380\" y2=\"210\" stroke=\"#7A6F65\" marker-end=\"url(#arr)\"><\u002Fline>\n        <line x1=\"290\" y1=\"156\" x2=\"610\" y2=\"210\" stroke=\"#7A6F65\" marker-end=\"url(#arr)\"><\u002Fline>\n        <line x1=\"150\" y1=\"266\" x2=\"150\" y2=\"300\" stroke=\"#7A6F65\" stroke-dasharray=\"3 3\"><\u002Fline>\n        <line x1=\"380\" y1=\"266\" x2=\"380\" y2=\"300\" stroke=\"#7A6F65\" stroke-dasharray=\"3 3\"><\u002Fline>\n        <line x1=\"610\" y1=\"266\" x2=\"610\" y2=\"300\" stroke=\"#7A6F65\" stroke-dasharray=\"3 3\"><\u002Fline>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cap\">Hadoop v1 — Client asks Job Tracker for work. Job Tracker uses Name Node to find data, then assigns tasks to TaskTrackers running on the same machines as the DataNodes (so data is local).<\u002Fdiv>\n  <\u002Fdiv>\n\n  <table class=\"tbl\">\n    <thead><tr><th>Role<\u002Fth><th>What it does<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Client<\u002Fstrong><\u002Ftd><td>You. Submits the job.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Job Tracker<\u002Fstrong><\u002Ftd><td>The \"manager\". Receives jobs, talks to the Name Node to find the data, assigns tasks.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Task Tracker<\u002Fstrong><\u002Ftd><td>The \"worker\". Runs Map / Reduce tasks in slots on one machine.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Name Node<\u002Fstrong><\u002Ftd><td>The \"librarian\". Knows which DataNode holds which block of which file.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Data Node<\u002Fstrong><\u002Ftd><td>The \"warehouse shelf\". Actually stores blocks of data on its local disk.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <div class=\"callout tip\">\n    <div class=\"icn\">i<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Data locality<\u002Fdiv>\n      <p><strong>\"Move the compute to the data, not the data to the compute.\"<\u002Fstrong> The Job Tracker tries to put a Map task on the\n      exact machine that already holds the block it needs (data-local), failing that on the same rack (rack-local), failing that\n      anywhere (remote). This is the single most important idea in Hadoop's performance story.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Things the framework gives you for free<\u002Fh3>\n  <ul>\n    <li><strong>InputFormat / OutputFormat<\u002Fstrong> — adapters for how to read/write data. <code class=\"inline\">TextInputFormat<\u002Fcode>\n    splits files by line. <code class=\"inline\">KeyValueTextInputFormat<\u002Fcode> reads tab-separated key/value pairs. There is one for\n    binary files (<code class=\"inline\">SequenceFileInputFormat<\u002Fcode>), tiny files combined (<code class=\"inline\">CombineFileInputFormat<\u002Fcode>),\n    even one that reads from a SQL database (<code class=\"inline\">DBInputFormat<\u002Fcode>).<\u002Fli>\n    <li><strong>Combiner<\u002Fstrong> — a mini-reducer that runs on the map machine before the shuffle, to cut down network traffic.\n    Must have <em>the same input and output types as the reducer<\u002Fem>. Example: in word count, sum the local 1s on each map node\n    before sending them across.<\u002Fli>\n    <li><strong>Partitioner<\u002Fstrong> — decides which reducer gets which key. Default is <code class=\"inline\">hash(key) % numReducers<\u002Fcode>.\n    Custom partitioners help if one reducer is getting too much load.<\u002Fli>\n    <li><strong>Distributed Cache<\u002Fstrong> — a small read-only file (a JAR, a config, a small lookup table) is copied once to every\n    Task Tracker. Faster than hitting HDFS every time.<\u002Fli>\n    <li><strong>Counters<\u002Fstrong> — built-in or custom numbers you can read to see how your job is doing.<\u002Fli>\n  <\u002Ful>\n\n  <h3>How Hadoop handles failure<\u002Fh3>\n  <ul>\n    <li>A task <strong>throws an exception<\u002Fstrong> → its JVM tells the Task Tracker, which tells the Job Tracker, which retries on another machine.<\u002Fli>\n    <li>A task's JVM <strong>crashes<\u002Fstrong> → the OS tells the Task Tracker.<\u002Fli>\n    <li>A task <strong>hangs silently<\u002Fstrong> → detected via heartbeat timeouts.<\u002Fli>\n    <li>A whole <strong>Task Tracker dies<\u002Fstrong> → Job Tracker stops seeing heartbeats, marks it dead, reschedules all its tasks.<\u002Fli>\n  <\u002Ful>\n\n  <h3>What is wrong with Hadoop?<\u002Fh3>\n  <p>This question shows up almost every year. Memorise these four:<\u002Fp>\n  <table class=\"tbl\">\n    <thead><tr><th>Problem<\u002Fth><th>Why it hurts<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Small-files problem<\u002Fstrong><\u002Ftd><td>HDFS blocks are 128 MB. Each file takes one entry in the Name Node's memory. Millions of tiny files flood the Name Node.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Disk between stages<\u002Fstrong><\u002Ftd><td>Every Map writes to disk, every Reduce reads from disk. Iterative jobs (chain 10 MapReduces) pay this cost 10 times.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>No caching<\u002Fstrong><\u002Ftd><td>Cannot keep a hot dataset in RAM. Designed when RAM was expensive.<\u002Ftd><\u002Ftr>\n      <tr><td><strong>Verbose Java only<\u002Fstrong><\u002Ftd><td>Each tiny job needs many classes. No clean abstractions. No streaming.<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Hadoop versions<\u002Fh3>\n  <ul>\n    <li><strong>v1<\u002Fstrong> — Plain Job Tracker + Task Tracker MapReduce.<\u002Fli>\n    <li><strong>v2<\u002Fstrong> — <strong>YARN<\u002Fstrong> (Yet Another Resource Negotiator) replaces Job Tracker so other engines (like Spark) can share the cluster.<\u002Fli>\n    <li><strong>v3<\u002Fstrong> — Multiple Name Nodes, erasure coding (cheaper redundancy than 3× replication), container / GPU support.<\u002Fli>\n  <\u002Ful>\n\n  <div class=\"callout exam\">\n    <div class=\"icn\">★<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Exam template — \"Design a MapReduce job for X\"<\u002Fdiv>\n      <p>Always answer in 5 numbered parts: <strong>(1) Input<\u002Fstrong> — what does one record look like? <strong>(2) Map<\u002Fstrong> — what\n      key-value does it emit? <strong>(3) Shuffle / sort<\u002Fstrong> — how are keys grouped? <strong>(4) Reduce<\u002Fstrong> — what\n      aggregation runs? <strong>(5) Output<\u002Fstrong> — what's written. Add one or two concrete sample records and you have full marks.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 04 · SPARK ========== -->\n<section class=\"chapter\" id=\"spark\">\n  <span class=\"eyebrow\">Chapter 04<\u002Fspan>\n  <h2 class=\"chapter-title\">Apache Spark<\u002Fh2>\n  <p class=\"lede\">Spark is \"MapReduce in memory\". It fixes Hadoop's biggest weakness — writing to disk between every stage —\n  and adds a much friendlier API.<\u002Fp>\n\n  <div class=\"analogy\">\n    <div class=\"label\">📝 Sticky note vs whiteboard analogy<\u002Fdiv>\n    <p>Hadoop is like writing each step of a long sum onto a fresh sticky note, putting it in a drawer, then taking it out\n    again for the next step. Spark is like keeping all the working on a big whiteboard in front of you. Same answer, far less\n    walking back and forth.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3>RDDs — Resilient Distributed Datasets<\u002Fh3>\n  <p>The core building block of Spark. An RDD is just <strong>an immutable, distributed collection of records<\u002Fstrong>, split into\n  partitions across the cluster.<\u002Fp>\n  <ul>\n    <li><strong>Resilient<\u002Fstrong> — if a partition is lost, Spark can rebuild it from its history (the DAG).<\u002Fli>\n    <li><strong>Distributed<\u002Fstrong> — split across many machines.<\u002Fli>\n    <li><strong>Dataset<\u002Fstrong> — a bunch of records, like a table.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Transformations vs Actions<\u002Fh3>\n  <div class=\"versus\">\n    <div class=\"side\">\n      <h4>Transformations (lazy)<\u002Fh4>\n      <p>Make a new RDD from an existing one. <strong>Nothing actually runs.<\u002Fstrong> Spark just records that you asked for it.<\u002Fp>\n      <ul>\n        <li><code class=\"inline\">map<\u002Fcode>, <code class=\"inline\">filter<\u002Fcode>, <code class=\"inline\">flatMap<\u002Fcode> — narrow<\u002Fli>\n        <li><code class=\"inline\">reduceByKey<\u002Fcode>, <code class=\"inline\">groupByKey<\u002Fcode>, <code class=\"inline\">join<\u002Fcode> — wide (shuffle)<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"vs-mid\">→<\u002Fdiv>\n    <div class=\"side\">\n      <h4>Actions (trigger)<\u002Fh4>\n      <p>Force the computation to actually run. Result goes to the driver or to storage.<\u002Fp>\n      <ul>\n        <li><code class=\"inline\">collect()<\u002Fcode>, <code class=\"inline\">count()<\u002Fcode>, <code class=\"inline\">first()<\u002Fcode><\u002Fli>\n        <li><code class=\"inline\">reduce()<\u002Fcode>, <code class=\"inline\">saveAsTextFile()<\u002Fcode>, <code class=\"inline\">foreach()<\u002Fcode><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Lazy evaluation &amp; the DAG<\u002Fh3>\n  <p>Because transformations are lazy, Spark sees the <em>whole recipe<\u002Fem> before it cooks anything. It builds a Directed\n  Acyclic Graph (DAG) of how each partition flows into the next, then it can optimise.<\u002Fp>\n\n  <div class=\"diagram\">\n    <svg viewBox=\"0 0 800 260\" role=\"img\" aria-label=\"Spark DAG with narrow and wide deps\">\n      <defs><marker id=\"arr2\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#7A6F65\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n      <g font-family=\"IBM Plex Sans\" font-size=\"12\">\n        <!-- Stage 1 -->\n        <rect x=\"30\" y=\"40\" width=\"320\" height=\"180\" rx=\"10\" fill=\"oklch(97% 0.02 250)\" stroke=\"oklch(80% 0.05 250)\" stroke-dasharray=\"4 3\"><\u002Frect>\n        <text x=\"40\" y=\"32\" font-weight=\"600\" fill=\"oklch(40% 0.13 250)\">Stage 1 · narrow · pipelined<\u002Ftext>\n\n        <g><rect x=\"50\" y=\"60\" width=\"80\" height=\"34\" rx=\"6\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect><text x=\"90\" y=\"82\" text-anchor=\"middle\">read<\u002Ftext><\u002Fg>\n        <g><rect x=\"170\" y=\"60\" width=\"80\" height=\"34\" rx=\"6\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect><text x=\"210\" y=\"82\" text-anchor=\"middle\">map<\u002Ftext><\u002Fg>\n        <g><rect x=\"290\" y=\"60\" width=\"40\" height=\"34\" rx=\"6\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect><\u002Fg>\n        <g><rect x=\"50\" y=\"120\" width=\"80\" height=\"34\" rx=\"6\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect><text x=\"90\" y=\"142\" text-anchor=\"middle\">filter<\u002Ftext><\u002Fg>\n        <g><rect x=\"170\" y=\"120\" width=\"80\" height=\"34\" rx=\"6\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect><text x=\"210\" y=\"142\" text-anchor=\"middle\">flatMap<\u002Ftext><\u002Fg>\n        <line x1=\"130\" y1=\"77\" x2=\"170\" y2=\"77\" stroke=\"#7A6F65\" marker-end=\"url(#arr2)\"><\u002Fline>\n        <line x1=\"250\" y1=\"77\" x2=\"290\" y2=\"77\" stroke=\"#7A6F65\" marker-end=\"url(#arr2)\"><\u002Fline>\n        <line x1=\"130\" y1=\"137\" x2=\"170\" y2=\"137\" stroke=\"#7A6F65\" marker-end=\"url(#arr2)\"><\u002Fline>\n\n        <!-- Shuffle boundary -->\n        <text x=\"378\" y=\"135\" font-family=\"JetBrains Mono\" font-size=\"12\" fill=\"oklch(55% 0.16 25)\">shuffle ↓<\u002Ftext>\n\n        <!-- Stage 2 -->\n        <rect x=\"450\" y=\"40\" width=\"320\" height=\"180\" rx=\"10\" fill=\"oklch(97% 0.03 60)\" stroke=\"oklch(80% 0.07 60)\" stroke-dasharray=\"4 3\"><\u002Frect>\n        <text x=\"460\" y=\"32\" font-weight=\"600\" fill=\"oklch(45% 0.13 60)\">Stage 2 · narrow · pipelined<\u002Ftext>\n        <g><rect x=\"470\" y=\"60\" width=\"120\" height=\"34\" rx=\"6\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect><text x=\"530\" y=\"82\" text-anchor=\"middle\">reduceByKey<\u002Ftext><\u002Fg>\n        <g><rect x=\"610\" y=\"60\" width=\"80\" height=\"34\" rx=\"6\" fill=\"white\" stroke=\"#D6CCBC\"><\u002Frect><text x=\"650\" y=\"82\" text-anchor=\"middle\">map<\u002Ftext><\u002Fg>\n        <g><rect x=\"470\" y=\"120\" width=\"80\" height=\"34\" rx=\"6\" fill=\"oklch(55% 0.16 25)\"><\u002Frect><text x=\"510\" y=\"142\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">action<\u002Ftext><\u002Fg>\n        <line x1=\"590\" y1=\"77\" x2=\"610\" y2=\"77\" stroke=\"#7A6F65\" marker-end=\"url(#arr2)\"><\u002Fline>\n\n        <text x=\"400\" y=\"240\" text-anchor=\"middle\" font-size=\"12\" fill=\"#7A6F65\">every wide dependency (shuffle) creates a new stage boundary<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cap\">A Spark job is one DAG. Narrow operations (map, filter) get pipelined into a single stage. A wide operation (reduceByKey, join) forces a shuffle and starts a new stage.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <table class=\"tbl\">\n    <thead><tr><th>Dependency<\u002Fth><th>What it means<\u002Fth><th>Causes shuffle?<\u002Fth><th>Examples<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td><strong>Narrow<\u002Fstrong><\u002Ftd><td>Each parent partition feeds at most one child partition.<\u002Ftd><td>No<\u002Ftd><td><code class=\"inline\">map<\u002Fcode>, <code class=\"inline\">filter<\u002Fcode>, <code class=\"inline\">flatMap<\u002Fcode><\u002Ftd><\u002Ftr>\n      <tr><td><strong>Wide<\u002Fstrong><\u002Ftd><td>Each parent partition feeds many child partitions.<\u002Ftd><td>Yes<\u002Ftd><td><code class=\"inline\">groupByKey<\u002Fcode>, <code class=\"inline\">reduceByKey<\u002Fcode>, <code class=\"inline\">join<\u002Fcode>, <code class=\"inline\">sortByKey<\u002Fcode><\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Spark architecture<\u002Fh3>\n  <div class=\"diagram\">\n    <svg viewBox=\"0 0 800 300\" role=\"img\" aria-label=\"Spark architecture\">\n      <defs><marker id=\"arr3\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#7A6F65\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n      <g font-family=\"IBM Plex Sans\" font-size=\"13\">\n        <rect x=\"280\" y=\"20\" width=\"240\" height=\"64\" rx=\"10\" fill=\"oklch(50% 0.13 250)\"><\u002Frect>\n        <text x=\"400\" y=\"46\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Driver program<\u002Ftext>\n        <text x=\"400\" y=\"64\" text-anchor=\"middle\" fill=\"#D6CCBC\" font-size=\"11\">SparkContext · builds the DAG<\u002Ftext>\n\n        <rect x=\"240\" y=\"120\" width=\"320\" height=\"56\" rx=\"10\" fill=\"#1E1A16\"><\u002Frect>\n        <text x=\"400\" y=\"144\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Cluster Manager<\u002Ftext>\n        <text x=\"400\" y=\"162\" text-anchor=\"middle\" fill=\"#D6CCBC\" font-size=\"11\">YARN · Mesos · Kubernetes · standalone<\u002Ftext>\n\n        <g>\n          <rect x=\"40\" y=\"220\" width=\"200\" height=\"60\" rx=\"10\" fill=\"oklch(95% 0.03 60)\" stroke=\"oklch(70% 0.07 60)\"><\u002Frect>\n          <text x=\"140\" y=\"244\" text-anchor=\"middle\" font-weight=\"600\">Worker · Executor<\u002Ftext>\n          <text x=\"140\" y=\"262\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">tasks · in-memory cache<\u002Ftext>\n          <rect x=\"300\" y=\"220\" width=\"200\" height=\"60\" rx=\"10\" fill=\"oklch(95% 0.03 60)\" stroke=\"oklch(70% 0.07 60)\"><\u002Frect>\n          <text x=\"400\" y=\"244\" text-anchor=\"middle\" font-weight=\"600\">Worker · Executor<\u002Ftext>\n          <text x=\"400\" y=\"262\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">tasks · in-memory cache<\u002Ftext>\n          <rect x=\"560\" y=\"220\" width=\"200\" height=\"60\" rx=\"10\" fill=\"oklch(95% 0.03 60)\" stroke=\"oklch(70% 0.07 60)\"><\u002Frect>\n          <text x=\"660\" y=\"244\" text-anchor=\"middle\" font-weight=\"600\">Worker · Executor<\u002Ftext>\n          <text x=\"660\" y=\"262\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">tasks · in-memory cache<\u002Ftext>\n        <\u002Fg>\n\n        <line x1=\"400\" y1=\"84\" x2=\"400\" y2=\"120\" stroke=\"#7A6F65\" marker-end=\"url(#arr3)\"><\u002Fline>\n        <line x1=\"320\" y1=\"176\" x2=\"140\" y2=\"220\" stroke=\"#7A6F65\" marker-end=\"url(#arr3)\"><\u002Fline>\n        <line x1=\"400\" y1=\"176\" x2=\"400\" y2=\"220\" stroke=\"#7A6F65\" marker-end=\"url(#arr3)\"><\u002Fline>\n        <line x1=\"480\" y1=\"176\" x2=\"660\" y2=\"220\" stroke=\"#7A6F65\" marker-end=\"url(#arr3)\"><\u002Fline>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cap\">Spark architecture — driver builds the plan, cluster manager hands resources out, executors do the actual work and hold the cached partitions.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Hadoop vs Spark — the big table<\u002Fh3>\n  <table class=\"tbl\">\n    <thead><tr><th><\u002Fth><th>Hadoop MapReduce<\u002Fth><th>Spark<\u002Fth><\u002Ftr><\u002Fthead>\n    <tbody>\n      <tr><td>Between stages<\u002Ftd><td>Writes to disk<\u002Ftd><td>Keeps in RAM<\u002Ftd><\u002Ftr>\n      <tr><td>Speed<\u002Ftd><td>Baseline<\u002Ftd><td><strong>10–100× faster<\u002Fstrong> for iterative work<\u002Ftd><\u002Ftr>\n      <tr><td>Chaining many jobs<\u002Ftd><td>Expensive (disk write + reread each time)<\u002Ftd><td>Cheap (just keep using the RDD)<\u002Ftd><\u002Ftr>\n      <tr><td>API<\u002Ftd><td>Low-level Java, very verbose<\u002Ftd><td>High-level, lambdas, Java/Scala/Python/R<\u002Ftd><\u002Ftr>\n      <tr><td>Streaming<\u002Ftd><td>No<\u002Ftd><td>Yes (Spark Streaming — micro-batches)<\u002Ftd><\u002Ftr>\n      <tr><td>Caching<\u002Ftd><td>None<\u002Ftd><td>In-memory caching of any RDD<\u002Ftd><\u002Ftr>\n      <tr><td>Fault tolerance<\u002Ftd><td>Disk replication<\u002Ftd><td>Recompute from RDD lineage (the DAG)<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3>Broadcast variables &amp; accumulators<\u002Fh3>\n  <div class=\"grid-2\">\n    <div class=\"card\">\n      <h4 style=\"margin-top:0\">Broadcast variable<\u002Fh4>\n      <p>A read-only piece of data you want every executor to have a copy of (e.g. a lookup table). Sent <strong>once per executor<\u002Fstrong>,\n      not once per task. Created with <code class=\"inline\">sc.broadcast(x)<\u002Fcode>, read with <code class=\"inline\">x.value()<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <h4 style=\"margin-top:0\">Accumulator<\u002Fh4>\n      <p>A global counter or sum that workers can add to, and only the driver reads after an action runs. Like a job-wide\n      <code class=\"inline\">+=<\u002Fcode>. Useful for diagnostics (\"how many bad records did we see?\").<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout exam\">\n    <div class=\"icn\">★<\u002Fdiv>\n    <div>\n      <div class=\"ttl\">Exam tip — reduceByKey vs groupByKey<\u002Fdiv>\n      <p><strong>Always prefer <code class=\"inline\">reduceByKey<\u002Fcode><\u002Fstrong>. It does a local combine on each partition first, so far less data\n      moves across the network. <code class=\"inline\">groupByKey<\u002Fcode> sends every single value across the wire to one reducer. This is the\n      Spark equivalent of using a Combiner in Hadoop.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3>Streaming — state &amp; back-pressure<\u002Fh3>\n  <p>Streaming is much harder than batch because data keeps arriving. Two pitfalls examiners love:<\u002Fp>\n  <ul>\n    <li><strong>State problem.<\u002Fstrong> If the same key (e.g. one user's running total) is split across many parallel tasks, the\n    state becomes inconsistent. Fix: <code class=\"inline\">keyBy(userId)<\u002Fcode> so every record for that user goes to the same task.<\u002Fli>\n    <li><strong>Back-pressure.<\u002Fstrong> When downstream is slower than upstream, queues fill up, upstream can't push, the whole\n    pipeline freezes. Fix: capacity planning, load shedding, or adaptive rate control.<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- ========== CHAPTER 05 · HDFS ========== -->\n<section class=\"chapter\" id=\"hdfs\">\n  <span class=\"eyebrow\">Chapter 05<\u002Fspan>\n  <h2 class=\"chapter-title\">HDFS — the Hadoop Distributed File System<\u002Fh2>\n  <p class=\"lede\">A big shared filesystem that runs on many cheap machines, designed for huge files and the assumption that hardware\n  will fail.<\u002Fp>\n\n  <div class=\"analogy\">\n    <div class=\"label\">📚 Library analogy<\u002Fdiv>\n    <p>Imagine a giant library with thousands of bookshelves (DataNodes). One librarian (the NameNode) keeps a card-catalog index\n    of where every book is shelved. Customers ask the librarian which shelf to go to, then walk straight there to read.\n    The librarian never carries the books — that would make her a bottleneck.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3>Design principles<\u002Fh3>\n  <ul>\n    <li><strong>Very large files<\u002Fstrong> (GB to TB), not millions of tiny files.<\u002Fli>\n    <li><strong>Write once, read many.<\u002Fstrong> Streaming reads, not random updates.<\u002Fli>\n    <li><strong>Runs on cheap commodity machines.<\u002Fstrong> Failures are normal, not exceptional.<\u002Fli>\n    <li><strong>Throughput over latency.<\u002Fstrong> Better to read a whole 1 GB block fast than to seek to byte 12345 quickly.<\u002Fli>\n  <\u002Ful>\n\n  <h3>Architecture<\u002Fh3>\n  <div class=\"diagram\">\n    <svg viewBox=\"0 0 800 280\" role=\"img\" aria-label=\"HDFS architecture\">\n      <defs><marker id=\"arr4\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"#7A6F65\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n      <g font-family=\"IBM Plex Sans\" font-size=\"13\">\n        <!-- Client -->\n        <rect x=\"60\" y=\"20\" width=\"120\" height=\"48\" rx=\"8\" fill=\"oklch(50% 0.13 250)\"><\u002Frect>\n        <text x=\"120\" y=\"48\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">Client<\u002Ftext>\n\n        <!-- Name Node -->\n        <rect x=\"320\" y=\"20\" width=\"200\" height=\"64\" rx=\"8\" fill=\"#1E1A16\"><\u002Frect>\n        <text x=\"420\" y=\"46\" text-anchor=\"middle\" fill=\"white\" font-weight=\"600\">NameNode<\u002Ftext>\n        <text x=\"420\" y=\"64\" text-anchor=\"middle\" fill=\"#D6CCBC\" font-size=\"11\">all metadata in RAM<\u002Ftext>\n\n        <!-- Standby -->\n        <rect x=\"600\" y=\"20\" width=\"160\" height=\"48\" rx=\"8\" fill=\"white\" stroke=\"#D6CCBC\" stroke-dasharray=\"3 3\"><\u002Frect>\n        <text x=\"680\" y=\"48\" text-anchor=\"middle\" fill=\"#7A6F65\">Standby NN<\u002Ftext>\n\n        <!-- DataNodes -->\n        <g>\n          <rect x=\"60\" y=\"160\" width=\"160\" height=\"80\" rx=\"8\" fill=\"oklch(95% 0.03 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n          <text x=\"140\" y=\"184\" text-anchor=\"middle\" font-weight=\"600\">DataNode 1<\u002Ftext>\n          <text x=\"140\" y=\"206\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">[blk_A] [blk_B] [blk_E]<\u002Ftext>\n          <text x=\"140\" y=\"222\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">heartbeat ↑ every 3s<\u002Ftext>\n\n          <rect x=\"240\" y=\"160\" width=\"160\" height=\"80\" rx=\"8\" fill=\"oklch(95% 0.03 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n          <text x=\"320\" y=\"184\" text-anchor=\"middle\" font-weight=\"600\">DataNode 2<\u002Ftext>\n          <text x=\"320\" y=\"206\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">[blk_A] [blk_C] [blk_D]<\u002Ftext>\n          <text x=\"320\" y=\"222\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">heartbeat ↑ every 3s<\u002Ftext>\n\n          <rect x=\"420\" y=\"160\" width=\"160\" height=\"80\" rx=\"8\" fill=\"oklch(95% 0.03 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n          <text x=\"500\" y=\"184\" text-anchor=\"middle\" font-weight=\"600\">DataNode 3<\u002Ftext>\n          <text x=\"500\" y=\"206\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">[blk_B] [blk_C] [blk_E]<\u002Ftext>\n          <text x=\"500\" y=\"222\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">heartbeat ↑ every 3s<\u002Ftext>\n\n          <rect x=\"600\" y=\"160\" width=\"160\" height=\"80\" rx=\"8\" fill=\"oklch(95% 0.03 250)\" stroke=\"oklch(70% 0.06 250)\"><\u002Frect>\n          <text x=\"680\" y=\"184\" text-anchor=\"middle\" font-weight=\"600\">DataNode 4<\u002Ftext>\n          <text x=\"680\" y=\"206\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">[blk_A] [blk_D] [blk_F]<\u002Ftext>\n          <text x=\"680\" y=\"222\" text-anchor=\"middle\" fill=\"#7A6F65\" font-size=\"11\">heartbeat ↑ every 3s<\u002Ftext>\n        <\u002Fg>\n\n        <line x1=\"180\" y1=\"44\" x2=\"320\" y2=\"44\" stroke=\"#7A6F65\" marker-end=\"url(#arr4)\"><\u002Fline>\n        <text x=\"240\" y=\"36\" font-size=\"11\" fill=\"#7A6F65
